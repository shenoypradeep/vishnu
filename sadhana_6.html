<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link rel="manifest" href="manifest.json">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<link rel="apple-touch-icon" href="../assets/logo.webp">
	
    <title>VSS | Sādhanā Mandala</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons" defer></script>
    <style>
        :root { --bg: #1e3a8a; --gold: #fbbf24; --glass: rgba(255, 255, 255, 0.07); --border: rgba(251, 191, 36, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .serif { font-family: 'Playfair Display', serif; }
        
        .logo-img { height: 40px; margin-bottom: 15px; }
        .header { position: sticky; top: 0; background: rgba(30, 58, 138, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        
        .content { padding: 10px; max-width: 800px; margin: auto; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-container { margin-bottom: 15px; padding: 0 5px; }
        .search-input { width: 100%; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; color: white; font-size: 14px; outline: none; transition: border 0.3s; }
        .search-input:focus { border-color: var(--gold); }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .card-body { padding: 15px; text-align: center; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: #1e3a8a; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        .nav-item { color: white; opacity: 0.6; display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); }

        /* Mandala Dashboard Specifics */
        .milestone-list { list-style: none; padding: 0; }
        .milestone-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .milestone-item:last-child { border-bottom: none; }
        
        #p-ring-new { fill: none; stroke: var(--gold); stroke-width: 5; stroke-dasharray: 219.9; stroke-dashoffset: 219.9; transform: rotate(-90deg); transform-origin: center; transition: 0.1s linear; }
        #flow-container:fullscreen { background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

<header class="header">
    <img src="../assets/logo.webp" class="logo-img" loading="eager" decoding="async">
    <h1 class="serif" style="font-size: 1.4rem; color: var(--gold);">Vedic Space</h1>
    <i data-feather="user" onclick="window.location.href='login.html'"></i>
</header>

<div class="content">

<section id="v-mandala" class="view active">
    <div class="card" style="padding: 20px; text-align: center; background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(255,255,255,0.05));">
        <h2 class="serif" style="color: var(--gold); margin-bottom: 10px;">Mandala Progress</h2>
        <div style="margin: 20px auto; width: 150px; height: 150px; position: relative;">
            <svg width="150" height="150" viewBox="0 0 150 150">
                <circle cx="75" cy="75" r="65" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="10"/>
                <circle id="mandala-progress-ring" cx="75" cy="75" r="65" fill="none" stroke="var(--gold)" stroke-width="10" 
                        stroke-dasharray="408.4" stroke-dashoffset="408.4" style="transition: 1.5s ease; transform: rotate(-90deg); transform-origin: center;"/>
            </svg>
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center;">
                <span id="day-count" style="font-size: 2rem; font-weight: bold; display: block;">1</span>
                <span style="font-size: 0.7rem; opacity: 0.7; text-transform: uppercase;">of 48 Days</span>
            </div>
        </div>
        <p id="sadhana-quote" style="font-style: italic; font-size: 0.85rem; padding: 0 10px;">"Consistency is the bridge between intention and realization."</p>
    </div>

    <div class="card" style="padding: 20px;">
        <h3 class="serif" style="margin-bottom: 15px; font-size: 1.1rem; color: var(--gold);">Daily Check-in</h3>
        <div style="display: grid; gap: 12px;">
            <select id="state-mind" class="search-input">
                <option value="" disabled selected>State of Mind...</option>
                <option>Restless / Scattered</option>
                <option>Calm / Centered</option>
                <option>Focused / Energized</option>
                <option>Deeply Still</option>
            </select>
            <select id="state-body" class="search-input">
                <option value="" disabled selected>Physical Body...</option>
                <option>Lethargic / Heavy</option>
                <option>Neutral</option>
                <option>Light / Vibrant</option>
            </select>
            <textarea id="sadhana-notes" class="search-input" placeholder="Notes on breath, sensations, or insights..." style="height: 80px; resize: none;"></textarea>
            <button onclick="logSadhana()" style="background: var(--gold); color: #1e3a8a; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <i data-feather="check-circle" style="width: 18px;"></i> Log Today's Practice
            </button>
        </div>
    </div>

    <div class="card" style="padding: 20px;">
        <h3 class="serif" style="margin-bottom: 10px; font-size: 1.1rem; color: var(--gold);">Lunar Milestones</h3>
        <div class="milestone-list">
            <div class="milestone-item"><i data-feather="moon" style="width: 16px;"></i> 01-May - Vaishakha Poornima</div>
            <div class="milestone-item"><i data-feather="circle" style="width: 16px;"></i> 16-May - Vaishakha Amavasya</div>
            <div class="milestone-item"><i data-feather="moon" style="width: 16px;"></i> 31-May - Adhika Jyeshta Poornima</div>
            <div class="milestone-item"><i data-feather="circle" style="width: 16px;"></i> 15-June - Adhika Jyeshtha Amavasya</div>
        </div>
    </div>

    <button onclick="exportLogs()" style="width: 100%; background: transparent; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <i data-feather="download" style="width: 16px;"></i> Export Experience Log
    </button>
</section>

<section id="v-pran" class="view">
    <div class="search-container">
        <input type="text" id="searchPran" class="search-input" placeholder="Search pranayama..." oninput="filterPran()">
    </div>
    <div id="pranGrid"></div>
</section>

<section id="v-flow" class="view">
    <div id="flow-container" class="card" style="padding: 2px; text-align: center; position: relative; border: none; background: transparent;">
        <button onclick="toggleFS()" class="fs-btn" style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 8px; z-index: 50; cursor: pointer;">
            <i data-feather="maximize" id="fs-icon" style="width: 18px; height: 18px;"></i>
        </button>
        <div class="slide-wrapper" style="position: relative; display: block; width: 100%; aspect-ratio: 16/9; min-height: 200px; margin: auto; background: #000; border-radius: 12px; overflow: hidden;">
            <img id="flow-slide" src="./parayana/Slide1.webp" style="display: block; width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0;">
            <button onclick="navSlide(-1)" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.15); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; z-index: 10;"><i data-feather="chevron-left"></i></button>
            <button onclick="navSlide(1)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.15); border: none; color: white; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; z-index: 10;"><i data-feather="chevron-right"></i></button>
        </div>
        <div class="flow-controls" style="margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 25px;">
            <div style="position: relative; width: 55px; height: 55px;" onclick="togglePlay()">
                <svg width="55" height="55"><circle cx="27.5" cy="27.5" r="24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/><circle id="p-ring-new" cx="27.5" cy="27.5" r="24" style="stroke-dasharray: 150.8; stroke-dashoffset: 150.8; stroke-width: 3;"/></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--gold); cursor: pointer;"><i data-feather="pause" id="play-pause-icon" style="width: 18px;"></i></div>
            </div>
            <div style="background: var(--glass); padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 14px;">
                <button onclick="adjSlideTime(-500)" style="background:none; border:none; color:var(--gold); font-size:24px; font-weight:700; cursor:pointer;">-</button>
                <span id="p-timer-val" style="font-weight:700; min-width: 40px; font-size: 14px;">5.0s</span>
                <button onclick="adjSlideTime(500)" style="background:none; border:none; color:var(--gold); font-size:24px; font-weight:700; cursor:pointer;">+</button>
            </div>
        </div>
    </div>
</section>

<section id="v-med" class="view">
    <div class="search-container">
        <input type="text" id="searchMed" class="search-input" placeholder="Search meditations..." oninput="filterMed()">
    </div>
    <div id="medGrid"></div>
</section>

</div>

<nav class="mobile-nav">
    <div class="nav-item active" onclick="showTab('mandala')" id="n-mandala"><i data-feather="shield"></i>Mandala</div>
    <div class="nav-item" onclick="showTab('pran')" id="n-pran"><i data-feather="wind"></i>Prāṇa</div>
    <div class="nav-item" onclick="showTab('flow')" id="n-flow"><i data-feather="refresh-cw"></i>Flow</div>
    <div class="nav-item" onclick="showTab('med')" id="n-med"><i data-feather="moon"></i>Dhyāna</div>
</nav>

<script>
const meditations = [
    {title:"Hari Om Meditation",audio:"./meditations/hari_om_meditation.mp3",img:"./meditations/Hari_Om_Chakras.webp"},
    {title:"Om Namah Shivaya",audio:"./meditations/om_namah_shivaya.mp3",img:"./meditations/Om_Namah_Shivaya.webp"},
    {title:"Samarpan Meditation",audio:"./meditations/samarpan.mp3",img:"./meditations/Samarpan.webp"},
    {title:"Silver String",audio:"./meditations/sliver_string.mp3",img:"./meditations/Silver_String.webp"},
    {title:"Energy Field",audio:"./meditations/strengthen_aura.mp3",img:"./meditations/Strengthen_Energy_Field.webp"},
    {title:"You Are The Light",audio:"./meditations/you_are_the_light.mp3",img:"./meditations/You_Are_The_Light.webp"}
];

const pranayamas = [
    {title:"Bhastrika Pranayama",video:"https://www.youtube.com/embed/iAlojRS6iBM"},
    {title:"Ujjayi Breathing",video:"https://www.youtube.com/embed/IQrsJ-yZWV8"},
    {title:"Bhramari Pranayama",video:"https://www.youtube.com/embed/-9CfCIzUw-k"},
    {title:"Kapalbhati Guide",video:"https://www.youtube.com/embed/WOw55qnKBSo"},
    {title:"Kapalbhati Advanced",video:"https://www.youtube.com/embed/RxQqFe3Q1AE"},
    {title:"Bhastrika Pranayama",video:"https://www.youtube.com/embed/kAlOoMbAqNc"},
    {title:"Chandra Bhedana",video:"https://www.youtube.com/embed/QGN8I7Ydvwo"},
    {title:"Shitali Cooling Breath",video:"https://www.youtube.com/embed/wWXN9Qx6fO0"},
    {title:"Surya Bhedana",video:"https://www.youtube.com/embed/4YIlmACF7g8"}
];

// Tab Management
const renderedTabs = { med: false, pran: false, flow: false, mandala: false };

function showTab(t){
    document.querySelectorAll('.view,.nav-item').forEach(el=>el.classList.remove('active'));
    document.getElementById('v-'+t).classList.add('active');
    document.getElementById('n-'+t).classList.add('active');
    renderTabIfNeeded(t);
}

function renderTabIfNeeded(tab){
    if(renderedTabs[tab]) return;
    if(tab === 'med') renderMed();
    if(tab === 'pran') renderPran();
    if(tab === 'flow') { preloadNearby(); feather.replace(); }
    if(tab === 'mandala') updateMandalaUI();
    renderedTabs[tab] = true;
}

// Mandala Logic
function logSadhana() {
    const mind = document.getElementById('state-mind').value;
    const body = document.getElementById('state-body').value;
    const notes = document.getElementById('sadhana-notes').value;
    
    if(!mind || !body) return alert("Please select your state of mind and body.");
    
    let logs = JSON.parse(localStorage.getItem('vss_logs') || '[]');
    logs.push({ date: new Date().toISOString(), mind, body, notes });
    localStorage.setItem('vss_logs', JSON.stringify(logs));
    
    alert("Sadhana logged successfully!");
    updateMandalaUI();
}

function updateMandalaUI() {
    const logs = JSON.parse(localStorage.getItem('vss_logs') || '[]');
    const count = logs.length;
    const progress = Math.min((count / 48) * 100, 100);
    
    document.getElementById('day-count').innerText = count || 0;
    const ring = document.getElementById('mandala-progress-ring');
    const circum = 2 * Math.PI * 65;
    ring.style.strokeDashoffset = circum * (1 - progress/100);
    feather.replace();
}

function exportLogs() {
    const logs = localStorage.getItem('vss_logs');
    if(!logs) return alert("No logs to export.");
    const blob = new Blob([logs], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'VSS_Sadhana_Log.json';
    a.click();
}

// Meditation & Pranayama Renderers
function renderMed(data=meditations){
    document.getElementById('medGrid').innerHTML=data.map(m=>`
    <div class="card">
    <img src="${m.img}" loading="lazy" decoding="async" style="width:100%; height:180px; object-fit:cover;">
    <div class="card-body"><h3 class="serif" style="font-size:1.2rem;">${m.title}</h3><audio controls preload="none" src="${m.audio}" style="width:100%; filter:invert(1); margin-top:10px;"></audio></div>
    </div>`).join('');
    feather.replace();
}

function renderPran(data=pranayamas){
    document.getElementById('pranGrid').innerHTML=data.map(p=>{
        const vidId=p.video.split('/').pop();
        return `<div class="card">
        <div class="video-box"><iframe src="${p.video}" loading="lazy" allowfullscreen></iframe></div>
        <div class="card-body"><h3 class="serif" style="font-size:1.2rem;">${p.title}</h3></div>
        </div>`;
    }).join('');
    feather.replace();
}

// Flow Logic
let pIdx=1,pOn=true,pStart=Date.now(),pDuration=5000;
function preloadNearby(){
    for(let i=-2;i<=2;i++){
        let idx=pIdx+i;
        if(idx<1) idx=109+idx; if(idx>109) idx=idx-109;
        const img=new Image(); img.src=`./parayana/Slide${idx}.webp`;
    }
}
function togglePlay(){
    pOn=!pOn; document.getElementById('play-pause-icon').setAttribute('data-feather',pOn?'pause':'play');
    if(pOn) pStart=Date.now(); feather.replace();
}
function adjSlideTime(delta){ pDuration=Math.max(1000,pDuration+delta); pStart=Date.now(); }
function navSlide(dir){
    pIdx+=dir; if(pIdx>109) pIdx=1; if(pIdx<1) pIdx=109;
    document.getElementById('flow-slide').src=`./parayana/Slide${pIdx}.webp`;
    preloadNearby(); pStart=Date.now();
}
function toggleFS(){
    const el=document.getElementById('flow-container');
    if(!document.fullscreenElement) el.requestFullscreen().catch(()=>{});
    else document.exitFullscreen();
}

function flowLoop(){
    const flowView=document.getElementById('v-flow');
    if(pOn&&flowView&&flowView.classList.contains('active')){
        let progress=(Date.now()-pStart)/pDuration;
        if(progress>=1){
            pIdx=(pIdx%109)+1; document.getElementById('flow-slide').src=`./parayana/Slide${pIdx}.webp`;
            preloadNearby(); pStart=Date.now(); progress=0;
        }
        const ring=document.getElementById('p-ring-new');
        if(ring){
            const circum=2*Math.PI*24;
            ring.style.strokeDasharray=circum; ring.style.strokeDashoffset=circum*(1-progress);
            document.getElementById('p-timer-val').innerText=(pDuration/1000).toFixed(1)+'s';
        }
    }
    requestAnimationFrame(flowLoop);
}

window.onload=()=>{
    updateMandalaUI();
    flowLoop();
    feather.replace();
};
</script>
</body>
</html>
