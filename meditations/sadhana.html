<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vedic Space | Meditations</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:#1e3a8a;
      --gold:#fbbf24;
      --bg:#0f172a;
      --card:rgba(255,255,255,0.06);
      --border:rgba(251,191,36,0.25);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --radius:20px;
      --sidebar:300px;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,sans-serif;
      background:linear-gradient(135deg,#1e3a8a,#0f172a);
      color:var(--text);
      min-height:100vh;
    }

    .app{display:flex;flex-direction:column}

    /* Sidebar Navigation */
    .sidebar{
      width:var(--sidebar);
      position:fixed;
      inset:0 auto 0 0;
      background:rgba(30,58,138,0.95);
      border-right:1px solid var(--border);
      padding:2rem;
      display:flex;
      flex-direction:column;
      gap:1.5rem;
    }

    .logo{
      font-family:Playfair Display,serif;
      font-size:1.5rem;
      font-weight:600;
      color: var(--gold);
    }

    .sidebar h1{
      font-family:Playfair Display,serif;
      font-weight:400;
      line-height:1.2;
      font-size: 1.8rem;
    }

    .sidebar h1 span{color:var(--gold)}

    .search input{
      width:100%;
      padding:0.9rem 1.2rem;
      border-radius:30px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.05);
      color:white;
      font-size:0.95rem;
      transition: 0.3s;
    }

    .search input:focus{
      outline:none;
      border-color:var(--gold);
      background:rgba(255,255,255,0.1);
    }

    /* Main Content Area */
    main{
      margin-left:var(--sidebar);
      padding:3.5rem;
      width:calc(100% - var(--sidebar));
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));
      gap:2rem;
    }

    /* The Meditation Card */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
      display: flex;
      flex-direction: column;
    }

    .card:hover{
      transform:translateY(-8px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border-color: rgba(251,191,36,0.5);
    }

    .card-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }

    .card-body {
      padding: 1.5rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .badge{
      display:inline-block;
      background: var(--gold);
      color:#1e3a8a;
      font-size:0.65rem;
      font-weight:800;
      padding:0.3rem 0.8rem;
      border-radius:50px;
      margin-bottom:1rem;
      text-transform:uppercase;
      align-self: flex-start;
    }

    .card h2{
      font-family:Playfair Display,serif;
      font-size:1.5rem;
      margin-bottom:0.75rem;
      color: #fff;
    }

    .desc{
      color:var(--muted);
      font-size:0.95rem;
      line-height:1.6;
      margin-bottom:1.5rem;
      flex-grow: 1;
    }

    /* Modern Audio Player Styling */
    audio {
      width: 100%;
      height: 40px;
      filter: sepia(20%) saturate(70%) grayscale(1) contrast(90%) invert(100%);
      opacity: 0.9;
    }

    .file-info {
      margin-top: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.5;
      font-family: monospace;
      text-align: right;
    }

    /* Mobile Adaptations */
    @media(max-width:900px){
      .sidebar{position: relative; width: 100%; border-right: none; border-bottom: 1px solid var(--border);}
      main{margin-left: 0; width: 100%; padding: 1.5rem;}
      .cards{grid-template-columns: 1fr;}
    }
  </style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo">Vedic Space</div>
    <h1><span>Sādhana</span><br>Guided Meditations</h1>
    <div class="search"><input id="search-input" placeholder="Search your practice..." autocomplete="off"></div>
    <div id="count-label" style="font-size: 0.8rem; color: var(--muted);"></div>
  </aside>

  <main>
    <div class="cards" id="meditation-grid"></div>
  </main>
</div>

<script>
// The Data Library
const meditations = [
  {
    title: "Silver String Meditation",
    artist: "Gurudev Sri Sri Ravi Shankar",
    image: "./Silver_String.png", // Placeholder for your Silver String Poster
    audio: "./audio/silver_string.mp3",
    description: "Experience a deep sacred space focusing on a silver string at the center of the body, extending from the spine to the infinite."
  },
  {
    title: "Hari Om Meditation",
    artist: "Gurudev Sri Sri Ravi Shankar",
    image: "./Hari_Om_Chakras.png",
    audio: "./audio/hari_om_meditation.mp3",
    description: "A rhythmic guided meditation using the 'Hari Om' chant to balance the chakras and calm the nervous system."
  },
  {
    title: "Om Namah Shivaya",
    artist: "Gurudev Sri Sri Ravi Shankar",
    image: "./Om_Namah_Shivaya.png",
    audio: "./audio/powerful_om_namah_shivaya.mp3",
    description: "A powerful mantra-based dhyāna that dissolves stress and connects you to the silent depths of your being."
  },
  {
    title: "Samarpan",
    artist: "Gurudev Sri Sri Ravi Shankar",
    image: "./Samarpan.png",
    audio: "./audio/samarpan.mp3",
    description: "A powerful mantra-based dhyāna that dissolves stress and connects you to the silent depths of your being."
  },
  {
    title: "Strengthen Your Aura",
    artist: "Gurudev Sri Sri Ravi Shankar",
    image: "./Strengthen_Energy_Field.png",
    audio: "./audio/strengthen_aura.mp3",
    description: "Strenthen Your Aura"
  },
    {
    title: "You Are The Light",
    artist: "Gurudev Sri Sri Ravi Shankar",
    image: "./You_Are_The_Light.png",
    audio: "./audio/you_are_the_light.mp3",
    description: "A powerful mantra-based dhyāna that dissolves stress and connects you to the silent depths of your being."
  }


];

const grid = document.getElementById('meditation-grid');
const searchInput = document.getElementById('search-input');
const countLabel = document.getElementById('count-label');

function render(data) {
  grid.innerHTML = '';
  countLabel.innerText = `Showing ${data.length} meditations`;
  
  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${item.image}" alt="${item.title}" class="card-img">
      <div class="card-body">
        <span class="badge">Guided</span>
        <h2>${item.title}</h2>
        <p class="desc">${item.description}</p>
        <audio controls>
          <source src="${item.audio}" type="audio/mpeg">
          Your browser does not support the audio element.
        </audio>
        <div class="file-info">${item.audio.split('/').pop()}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// Search Logic
searchInput.addEventListener('input', (e) => {
  const term = e.target.value.toLowerCase();
  const filtered = meditations.filter(m => 
    m.title.toLowerCase().includes(term) || 
    m.description.toLowerCase().includes(term)
  );
  render(filtered);
});

// Initial Load
render(meditations);
</script>

</body>
</html>
