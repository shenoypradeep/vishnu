<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link rel="manifest" href="manifest.json">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<link rel="apple-touch-icon" href="../assets/logo.webp">
	
    <title>VSS | Sādhanā Mandala</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons" defer></script>
    <script src='https://8x8.vc/vpaas-magic-cookie-47ba1aabdd84458d9977951213e7d9f0/external_api.js' async></script>
    <style>
        :root { --bg: #1e3a8a; --gold: #fbbf24; --glass: rgba(255, 255, 255, 0.07); --border: rgba(251, 191, 36, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .serif { font-family: 'Playfair Display', serif; }
        
        .header { position: sticky; top: 0; background: rgba(30, 58, 138, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .content { padding: 10px; max-width: 800px; margin: auto; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .mandala-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px; margin-top: 15px; }
        .day-square { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .day-square.completed { background: var(--gold); color: var(--bg); font-weight: bold; border-color: var(--gold); }
        .day-square.special { border: 2px solid #ff4757; color: #ff4757; font-weight: bold; }
        
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: #1e3a8a; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px; z-index: 1000; }
        .nav-item { color: white; opacity: 0.6; display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        
        #p-ring-new { fill: none; stroke: var(--gold); stroke-width: 5; transform: rotate(-90deg); transform-origin: center; transition: 0.1s linear; }
        
        #flow-container:fullscreen { background: #000; display: flex; flex-direction: column; padding: 0; width: 100vw; height: 100vh; }
        #flow-container:fullscreen .slide-wrapper { width: 100vw; height: 100vh; border-radius: 0; }

        /* Unified Sleek Bar for Landscape & Fullscreen */
        #flow-container:fullscreen .flow-controls,
        @media screen and (max-height: 450px) {
            #flow-container .flow-controls {
                position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
                width: 95%; max-width: 700px; background: rgba(0, 0, 0, 0.7);
                border-radius: 50px; padding: 5px 15px; backdrop-filter: blur(15px);
                border: 1px solid rgba(255, 255, 255, 0.15);
                display: flex !important; flex-direction: row !important;
                justify-content: space-evenly !important; align-items: center !important;
                margin-top: 0 !important; z-index: 200;
            }
        }

        .mode-toggle { display: flex; background: var(--glass); border-radius: 12px; padding: 2px; border: 1px solid var(--border); height: 40px; min-width: 140px; }
        .mode-btn { flex: 1; border: none; background: transparent; color: white; border-radius: 8px; cursor: pointer; font-size: 10px; transition: 0.3s; padding: 0 4px; }
        .mode-btn.active { background: var(--gold); color: var(--bg); font-weight: bold; }
    </style>
</head>
<body onkeydown="handleKeys(event)">

<header class="header">
    <img src="../assets/logo.webp" class="logo-img" style="height:40px;">
    <h1 class="serif" style="font-size: 1.4rem; color: var(--gold);">Vedic Space</h1>
    <i data-feather="user" onclick="window.location.href='login.html'"></i>
</header>

<div class="content">
<section id="v-flow" class="view active">
    <div id="flow-container" class="card" style="padding: 2px; text-align: center; position: relative; border: none; background: transparent;">
        <button onclick="toggleFS()" class="fs-btn" style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 8px; z-index: 110;">
            <i data-feather="maximize" id="fs-icon" style="width: 18px;"></i>
        </button>

        <div class="slide-wrapper" id="slide-area" style="position: relative; display: block; width: 100%; aspect-ratio: 16/9; min-height: 200px; margin: auto; background: #000; border-radius: 12px; overflow: hidden; touch-action: pan-y;">
            <img id="flow-slide" src="./parayana/Slide1.webp" style="display: block; width: 100%; height: 100%; object-fit: contain; position: absolute; top: 0; left: 0;">
            <button onclick="navSlide(-1)" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.15); border: none; color: white; border-radius: 50%; width: 44px; height: 44px; z-index: 10;"><i data-feather="chevron-left"></i></button>
            <button onclick="navSlide(1)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.15); border: none; color: white; border-radius: 50%; width: 44px; height: 44px; z-index: 10;"><i data-feather="chevron-right"></i></button>
        </div>

        <div class="flow-controls" style="margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 12px; z-index: 100; padding: 10px;">
            <div class="mode-toggle">
                <button id="mode-chanting" class="mode-btn active" onclick="setMode('chanting')">Chant</button>
                <button id="mode-sadhana" class="mode-btn" onclick="setMode('sadhana')">Sādhanā</button>
            </div>

            <div style="position: relative; width: 50px; height: 50px;" onclick="togglePlay()">
                <svg width="50" height="50"><circle cx="25" cy="25" r="22" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"/><circle id="p-ring-new" cx="25" cy="25" r="22" style="stroke-dasharray: 138.2; stroke-dashoffset: 138.2; stroke-width: 3; fill: none; stroke: var(--gold); transform: rotate(-90deg); transform-origin: center;"/></svg>
                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--gold);"><i data-feather="play" id="play-pause-icon" style="width: 22px;"></i></div>
            </div>

            <div style="background: var(--glass); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px;">
                <div style="display:flex; flex-direction:column;">
                    <div style="display:flex; align-items:center; gap:4px;"><span style="font-size:8px; opacity:0.6;">1s</span><button onclick="adjSlideTime(-1000)" style="background:none; border:none; color:var(--gold); font-size:16px;">-</button><button onclick="adjSlideTime(1000)" style="background:none; border:none; color:var(--gold); font-size:16px;">+</button></div>
                    <div style="display:flex; align-items:center; gap:4px;"><span style="font-size:8px; opacity:0.6;">50m</span><button onclick="adjSlideTime(-50)" style="background:none; border:none; color:var(--gold); font-size:16px;">-</button><button onclick="adjSlideTime(50)" style="background:none; border:none; color:var(--gold); font-size:16px;">+</button></div>
                </div>
                <span id="p-timer-val" style="font-weight:700; min-width: 45px; font-size: 13px;">01.10</span>
            </div>

            <div style="display: flex; align-items: center; gap: 5px; background: var(--glass); padding: 5px; border-radius: 25px; border: 1px solid var(--border);">
                <audio id="flow-bg-audio" preload="auto" onended="handleAudioEnd()"></audio>
                <button onclick="toggleAudioMute()" style="width:40px; height:40px; border:none; background:none; color:var(--gold);"><i id="audio-icon" data-feather="volume-2"></i></button>
                <button onclick="toggleAudioPlay()" style="width:40px; height:40px; border:none; background:none; color:var(--gold);"><i id="audio-play-icon" data-feather="play"></i></button>
            </div>
        </div>
    </div>
</section>

<section id="v-mandala" class="view">
    <div class="card" style="padding: 20px;">
        <h2 class="serif" style="color: var(--gold); text-align: center; margin-bottom: 5px;">Mandala Console</h2>
        <div id="mandalaStatus" class="mandala-grid"></div>
        <button onclick="saveDailyProgress()" style="width: 100%; margin-top: 15px; background: var(--gold); border: none; padding: 14px; border-radius: 12px; font-weight: bold;">Log Today's Journey</button>
    </div>
</section>
</div>

<nav class="mobile-nav">
    <div class="nav-item active" onclick="showTab('flow')" id="n-flow"><i data-feather="refresh-cw"></i>Flow</div>
    <div class="nav-item" onclick="showTab('mandala')" id="n-mandala"><i data-feather="zap"></i>Mandala</div>
</nav>

<script>
let mandalaData = JSON.parse(localStorage.getItem('vss_mandala_tracker')) || { completed: [], specialDays: [1, 15, 30, 45] };
let currentMode = 'chanting', pIdx=1, pOn=false, pStart=Date.now(), pDuration=70000;

function showTab(t){
    document.querySelectorAll('.view,.nav-item').forEach(el=>el.classList.remove('active'));
    document.getElementById('v-'+t).classList.add('active');
    document.getElementById('n-'+t).classList.add('active');
    if(t === 'mandala') renderMandalaGrid();
}

function setMode(mode) {
    currentMode = mode;
    document.getElementById('mode-chanting').classList.toggle('active', mode === 'chanting');
    document.getElementById('mode-sadhana').classList.toggle('active', mode === 'sadhana');
    const audio = document.getElementById('flow-bg-audio');
    audio.pause(); audio.src = "./meditations/vss.mp3"; audio.load();
    document.getElementById('audio-play-icon').setAttribute('data-feather', 'play'); feather.replace();
}

function handleAudioEnd() {
    const audio = document.getElementById('flow-bg-audio');
    if (currentMode === 'sadhana' && audio.src.toLowerCase().includes('vss.mp3')) {
        audio.src = "./meditations/hari_om_meditation.mp3"; audio.load(); audio.play();
    } else { document.getElementById('audio-play-icon').setAttribute('data-feather', 'play'); feather.replace(); }
}

function togglePlay(){ 
    pOn=!pOn; document.getElementById('play-pause-icon').setAttribute('data-feather',pOn?'pause':'play'); 
    if(pOn) pStart=Date.now(); feather.replace(); 
}

function adjSlideTime(delta){ pDuration=Math.max(50,pDuration+delta); pStart=Date.now(); updateTimerText(); }
function updateTimerText(){
    let s = Math.floor(pDuration / 1000); let ms = Math.floor((pDuration % 1000) / 10);
    document.getElementById('p-timer-val').innerText = `${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
}

function handleKeys(e) {
    if (e.key === "ArrowRight") navSlide(1); if (e.key === "ArrowLeft") navSlide(-1);
    if (e.altKey && e.key === "Enter") toggleFS();
}

function navSlide(dir){ 
    pIdx+=dir; if(pIdx>109) pIdx=1; if(pIdx<1) pIdx=109; 
    document.getElementById('flow-slide').src=`./parayana/Slide${pIdx}.webp`; pStart=Date.now(); 
}

function toggleFS(){ 
    const el = document.getElementById('flow-container'); 
    if(!document.fullscreenElement) el.requestFullscreen().catch(()=>{}); else document.exitFullscreen(); 
}

function toggleAudioPlay() {
    const audio = document.getElementById('flow-bg-audio');
    if (!audio.src) audio.src = "./meditations/vss.mp3";
    if (audio.paused) {
        audio.play().then(() => document.getElementById('audio-play-icon').setAttribute('data-feather', 'pause')).catch(()=>{});
    } else { audio.pause(); document.getElementById('audio-play-icon').setAttribute('data-feather', 'play'); }
    feather.replace();
}

function toggleAudioMute() {
    const a = document.getElementById('flow-bg-audio');
    a.muted = !a.muted;
    document.getElementById('audio-icon').setAttribute('data-feather', a.muted ? 'volume-x' : 'volume-2');
    feather.replace();
}

// Slide Swipe Logic
let touchStartX = 0;
document.getElementById('slide-area').addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; });
document.getElementById('slide-area').addEventListener('touchend', e => {
    let touchEndX = e.changedTouches[0].screenX;
    if (touchStartX - touchEndX > 50) navSlide(1);
    if (touchEndX - touchStartX > 50) navSlide(-1);
});

function flowLoop(){
    const flowView=document.getElementById('v-flow');
    if(pOn && flowView.classList.contains('active')){
        let progress=(Date.now()-pStart)/pDuration;
        if(progress>=1){ pIdx=(pIdx%109)+1; navSlide(0); progress=0; }
        const ring = document.getElementById('p-ring-new');
        if(ring){ const circum=138.2; ring.style.strokeDashoffset = circum * (1 - progress); }
    }
    requestAnimationFrame(flowLoop);
}

function renderMandalaGrid() {
    const grid = document.getElementById('mandalaStatus'); grid.innerHTML = '';
    for (let i = 1; i <= 45; i++) {
        const div = document.createElement('div');
        div.className = `day-square ${mandalaData.completed.includes(i) ? 'completed' : ''} ${mandalaData.specialDays.includes(i) ? 'special' : ''}`;
        div.innerText = i; grid.appendChild(div);
    }
}

function saveDailyProgress() {
    const nextDay = mandalaData.completed.length + 1;
    if (nextDay <= 45) {
        mandalaData.completed.push(nextDay);
        localStorage.setItem('vss_mandala_tracker', JSON.stringify(mandalaData));
        renderMandalaGrid();
    }
}

window.onload=()=>{ updateTimerText(); flowLoop(); feather.replace(); };
</script>
</body>
</html>
