<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shri Vishnu Sahasranama Sadhana</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:serif;
text-align:center;
}

h2{
font-weight:400;
margin-top:10px;
}

/* viewer */

.viewer{
display:flex;
justify-content:center;
align-items:center;
margin-top:10px;
gap:30px;
}

#slide{
max-height:88vh;
max-width:82vw;
border-radius:16px;
box-shadow:0 0 25px rgba(255,215,0,0.35);
}

/* chakra control */

.timerBox{
position:relative;
width:140px;
height:140px;
display:flex;
align-items:center;
justify-content:center;
}

/* svg */

#chakra{
position:absolute;
width:140px;
height:140px;
}

/* rings */

.bgRing{
stroke:#333;
stroke-width:4;
fill:none;
}

.progressRing{
stroke:#ffd700;
stroke-width:6;
fill:none;
stroke-linecap:round;
transform:rotate(-90deg);
transform-origin:center;
filter:drop-shadow(0 0 6px gold);
}

/* spokes */

.spoke{
stroke:#d4af37;
stroke-width:5;
stroke-linecap:round;
}

/* hub */

.hub{
fill:#d4af37;
}

/* interaction zones */

.zone{
position:absolute;
width:50%;
height:100%;
top:0;
cursor:pointer;
}

.leftZone{ left:0; }
.rightZone{ right:0; }

/* center play */

#centerBtn{
position:absolute;
width:60px;
height:60px;
border-radius:50%;
background:#ffd700;
color:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
cursor:pointer;
box-shadow:0 0 15px rgba(255,215,0,0.7);
}

/* fullscreen */

#fullscreenBtn{
position:absolute;
bottom:8px;
right:10px;
font-size:14px;
opacity:0.7;
cursor:pointer;
}

/* timer display */

.timerControls{
margin-top:6px;
display:flex;
justify-content:center;
align-items:center;
gap:6px;
}

button{
padding:4px 8px;
background:#222;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

#timeDisplay{
width:70px;
text-align:center;
}

</style>

</head>

<body>

<h2>Shri Vishnu Sahasranama Sadhana</h2>

<div class="viewer">

<img id="slide" src="./Slide1.PNG">

<div class="timerBox">

<!-- chakra svg -->

<svg id="chakra" viewBox="0 0 120 120">

<circle class="bgRing" cx="60" cy="60" r="52"></circle>

<circle id="progress"
class="progressRing"
cx="60"
cy="60"
r="52"
stroke-dasharray="327"
stroke-dashoffset="327"></circle>

<!-- spokes -->

<line class="spoke" x1="60" y1="8" x2="60" y2="34"/>
<line class="spoke" x1="60" y1="112" x2="60" y2="86"/>

<line class="spoke" x1="8" y1="60" x2="34" y2="60"/>
<line class="spoke" x1="112" y1="60" x2="86" y2="60"/>

<circle class="hub" cx="60" cy="60" r="6"></circle>

</svg>

<!-- interaction layers -->

<div class="zone leftZone" onclick="prevSlide()"></div>
<div class="zone rightZone" onclick="nextSlide()"></div>

<div id="centerBtn" onclick="togglePlay()">⏸</div>

<div id="fullscreenBtn" onclick="fullscreen()">⛶</div>

</div>

</div>

<div class="timerControls">
<button onclick="adjust(-0.25)">-</button>
<div id="timeDisplay">3.00s</div>
<button onclick="adjust(0.25)">+</button>
</div>

<script>

/* slides */

const slides = Array.from({length:112}, (_,i)=>`./Slide${i+1}.PNG`)

let index = 0
let duration = 3000
let playing = true
let start = performance.now()

const img = document.getElementById("slide")
const progress = document.getElementById("progress")
const centerBtn = document.getElementById("centerBtn")

const circumference = 327

function showSlide(){
img.src = slides[index]
start = performance.now()
}

function nextSlide(){
index = (index+1)%slides.length
showSlide()
}

function prevSlide(){
index = (index-1+slides.length)%slides.length
showSlide()
}

function togglePlay(){
playing = !playing
centerBtn.innerText = playing ? "⏸" : "▶"

if(playing){
start = performance.now()
}
}

function adjust(delta){
duration += delta*1000
if(duration<200) duration=200
updateDisplay()
start = performance.now()
}

function updateDisplay(){
document.getElementById("timeDisplay").innerText =
(duration/1000).toFixed(2)+"s"
}

function fullscreen(){
if(!document.fullscreenElement){
document.documentElement.requestFullscreen()
}else{
document.exitFullscreen()
}
}

function animate(){
requestAnimationFrame(animate)

if(!playing) return

let now = performance.now()
let elapsed = now-start
let ratio = elapsed/duration

if(ratio>=1){
nextSlide()
ratio=0
}

let offset = circumference*(1-ratio)
progress.style.strokeDashoffset = offset
}

updateDisplay()
animate()

</script>

</body>
</html>
