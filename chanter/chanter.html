<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shri Vishnu Sahasranama Sadhana</title>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:serif;
text-align:center;
}

h1{
font-weight:400;
margin-top:10px;
}

/* slide layout */

.viewer{

display:flex;
justify-content:center;
align-items:center;

margin-top:10px;
gap:20px;

}

#slide{

max-height:88vh;
max-width:82vw;

border-radius:16px;

box-shadow:
0 0 25px rgba(255,215,0,0.35);

}

/* chakra */

.timerBox{

width:120px;
height:120px;

display:flex;
align-items:center;
justify-content:center;

}

#chakra{

width:120px;
height:120px;

}

/* chakra ring */

.bgRing{

stroke:#333;
stroke-width:4;
fill:none;

}

/* timer glow */

.progressRing{

stroke:#ffd700;
stroke-width:6;
fill:none;

stroke-linecap:round;

transform:rotate(-90deg);
transform-origin:center;

filter:drop-shadow(0 0 6px gold);

}

/* spokes */

.spoke{

stroke:#d4af37;
stroke-width:5;
stroke-linecap:round;

}

/* hub */

.hub{

fill:#d4af37;

}

/* controls */

.controls{

margin-top:8px;

}

button{

padding:5px 10px;
margin:2px;

border:none;
border-radius:6px;

background:#222;
color:white;

cursor:pointer;

}

button:hover{

background:#444;

}

.timerControls{

margin-top:6px;

display:flex;
justify-content:center;
align-items:center;
gap:6px;

}

#timeDisplay{

width:70px;

}

</style>

</head>

<body>

<h2>Shri Vishnu Sahasranama Sadhana</h2>

<div class="viewer">

<img id="slide" src="slides/slide1.jpg">

<div class="timerBox">

<svg id="chakra" viewBox="0 0 120 120">

<!-- ring -->

<circle class="bgRing" cx="60" cy="60" r="52"></circle>

<!-- timer progress -->

<circle id="progress"
class="progressRing"
cx="60"
cy="60"
r="52"
stroke-dasharray="327"
stroke-dashoffset="327"></circle>

<!-- spokes -->

<line class="spoke" x1="60" y1="8" x2="60" y2="34"/>
<line class="spoke" x1="60" y1="112" x2="60" y2="86"/>

<line class="spoke" x1="8" y1="60" x2="34" y2="60"/>
<line class="spoke" x1="112" y1="60" x2="86" y2="60"/>

<!-- hub -->

<circle class="hub" cx="60" cy="60" r="6"></circle>

</svg>

</div>

</div>

<div class="controls">

<button onclick="prevSlide()">Last Slide</button>
<button onclick="togglePlay()">Play / Pause</button>
<button onclick="nextSlide()">Next Slide</button>
<button onclick="fullscreen()">Fullscreen</button>

</div>

<div class="timerControls">

<button onclick="adjust(-0.25)">-</button>

<div id="timeDisplay">3.00s</div>

<button onclick="adjust(0.25)">+</button>

</div>

]

let index = 0

let duration = 3000

let playing = true

let start = performance.now()

const img = document.getElementById("slide")

const progress = document.getElementById("progress")

const circumference = 327

/* slide control */

function showSlide(){

img.src = slides[index]

start = performance.now()

}

/* navigation */

function nextSlide(){

index = (index+1)%slides.length

showSlide()

}

function prevSlide(){

index = (index-1+slides.length)%slides.length

showSlide()

}

/* play pause */

function togglePlay(){

playing = !playing

if(playing){

start = performance.now()

}

}

/* adjust timing */

function adjust(delta){

duration += delta*1000

if(duration<200) duration=200

updateDisplay()

start = performance.now()

}

function updateDisplay(){

document.getElementById("timeDisplay").innerText =
(duration/1000).toFixed(2)+"s"

}

/* fullscreen */

function fullscreen(){

if(!document.fullscreenElement){

document.documentElement.requestFullscreen()

}else{

document.exitFullscreen()

}

}

/* animation loop */

function animate(){

requestAnimationFrame(animate)

if(!playing) return

let now = performance.now()

let elapsed = now-start

let ratio = elapsed/duration

if(ratio>=1){

nextSlide()

ratio=0

}

let offset = circumference*(1-ratio)

progress.style.strokeDashoffset = offset

}

updateDisplay()

animate()

</script>

</body>
</html>
