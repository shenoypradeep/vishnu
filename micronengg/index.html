<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micron Engineering Corp | Product Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Metallic Logo Palette */
            --primary: #2a8b54; /* Rich metallic green */
            --primary-dark: #165632;
            --accent-silver: #d1d5db;
            
            /* Dark Theme Colors */
            --bg-main: #080a0b; /* Deep black to match logo background */
            --card-bg: #121517;
            --card-border: #23282b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Effects */
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            --glow: 0 0 20px rgba(42, 139, 84, 0.25);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.6; 
        }

        /* Header */
        header {
            background: rgba(8, 10, 11, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-img {
            height: 55px;
            object-fit: contain;
            border-radius: 50%; /* Smooth blending */
        }
        .logo-text h1 { 
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main); 
            font-size: 1.5rem; 
            font-weight: 800; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .logo-text h1 span { color: var(--primary); }
        .logo-text p { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            font-weight: 500; 
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        
        .iso-badge {
            font-size: 0.85rem; 
            font-weight: 600; 
            color: var(--primary); 
            background: rgba(42, 139, 84, 0.1); 
            border: 1px solid var(--primary-dark);
            padding: 6px 14px; 
            border-radius: 30px;
            letter-spacing: 0.5px;
        }

        /* Navigation & Filters */
        .filters {
            display: flex;
            gap: 12px;
            padding: 2rem 5%;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }
        
        .filter-btn {
            background: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--card-border);
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .filter-btn.active, .filter-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: var(--glow);
        }

        /* Layout */
        .main-container {
            padding: 1rem 5% 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Product Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2.5rem;
        }

        /* Product Card */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--card-border);
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: var(--glow);
        }
        .card-img-wrap {
            height: 280px;
            background: #000000;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            cursor: zoom-in;
        }
        .card-img-wrap::after {
            content: '🔍 Expand';
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: var(--text-muted);
            font-size: 0.8rem;
            opacity: 0;
            transition: var(--transition);
        }
        .card:hover .card-img-wrap::after {
            opacity: 1;
        }
        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: transform 0.6s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }
        .card:hover .card-img-wrap img {
            transform: scale(1.05);
        }
        .card-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--primary-dark);
            color: var(--accent-silver);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
            border: 1px solid var(--primary);
        }
        .card-content {
            padding: 1.8rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.4rem;
            color: var(--text-main);
            margin-bottom: 0.75rem;
            font-weight: 700;
        }
        .card-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }
        .card-desc ul {
            padding-left: 1.2rem;
            margin-top: 0.5rem;
        }
        .card-desc li {
            margin-bottom: 0.6rem;
        }
        .card-desc li::marker {
            color: var(--primary);
        }
        
        /* Modals / Accordions for Tech Data */
        details {
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            border: 1px solid var(--card-border);
            margin-top: auto;
            transition: var(--transition);
        }
        summary {
            padding: 1rem;
            font-weight: 500;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            color: var(--accent-silver);
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        summary:hover {
            color: var(--primary);
        }
        summary::-webkit-details-marker { display: none; }
        summary::after { content: '+'; font-size: 1.2rem; transition: transform 0.3s; color: var(--primary); }
        details[open] summary::after { content: '−'; }
        .details-inner {
            padding: 1rem;
            border-top: 1px solid var(--card-border);
            font-size: 0.9rem;
            background: rgba(0,0,0,0.2);
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        .specs-table {
            width: 100%;
            border-collapse: collapse;
        }
        .specs-table th, .specs-table td {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .specs-table tr:last-child th,
        .specs-table tr:last-child td {
            border-bottom: none;
        }
        .specs-table th { 
            color: var(--accent-silver); 
            font-weight: 500;
            width: 35%;
        }
        .specs-table td {
            color: var(--text-muted);
        }

        /* Full Screen Image Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            padding-top: 50px;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(5px);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 1;
        }
        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: var(--glow);
            object-fit: contain;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .modal.show .modal-content {
            transform: scale(1);
        }
        .close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: 300;
            transition: 0.3s;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .close:hover,
        .close:focus {
            color: var(--primary);
            text-decoration: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 1rem; align-items: flex-start; padding: 1.5rem 5%; }
            .grid { grid-template-columns: 1fr; }
            .filters { padding: 1rem 5%; }
            .card-img-wrap { height: 240px; }
            .close { top: 15px; right: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="./assets/micron_logo.png" alt="Micron Logo" class="logo-img" onerror="this.src='micron_logo.jpg'; this.onerror=null;">
            <div class="logo-text">
                <h1>MICRON<span>.</span></h1>
                <p>Fluid Coupler Solutions</p>
            </div>
        </div>
        <div class="iso-badge">
            ISO 9001 Certified
        </div>
    </header>

    <nav class="filters" id="filter-container">
        <button class="filter-btn active" data-filter="all">All Products</button>
        <button class="filter-btn" data-filter="tube">Tube-Gripping Series</button>
        <button class="filter-btn" data-filter="auto">Automotive & Valves</button>
        <button class="filter-btn" data-filter="highprod">High-Production</button>
    </nav>

    <main class="main-container">
        <div class="grid" id="product-grid">
            </div>
    </main>

    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <img class="modal-content" id="expandedImg">
    </div>

    <script>
        // Product Data
        const products = [
            {
                id: "ds-series",
                category: "highprod",
                name: "DS Series",
                tag: "High-Production",
                image: "./assets/microns_catalog-images-9.jpg",
                features: [
                    "Refrigerant gas charging & vacuum application.",
                    "Socket & plug equipped with automatic shut off valves.",
                    "Withstands vacuum up to 1.3 x 10^-1 pa.",
                    "Double O-rings for high air tightness."
                ],
                materials: "Stainless Steel & Brass",
                fluids: "Refrigerant, Oil, Air, Helium, R134a, R410a"
            },
            {
                id: "tcl-series",
                category: "tube",
                name: "TCL Series",
                tag: "Tube-Gripping",
                image: "./assets/microns_catalog-images-11.jpg",
                features: [
                    "Clamps directly on straight tubes with thumb operation.",
                    "Avoids brazing entirely, reducing cycle time.",
                    "Excellent for water dip testing for heat exchangers.",
                    "Quick connection & disconnection."
                ],
                materials: "Brass & Stainless steel",
                fluids: "Viton (High Temp), Neoprene, HNBR, Nitrile"
            },
            {
                id: "tqc-series",
                category: "tube",
                name: "TQC Series",
                tag: "Tube-Gripping",
                image: "./assets/microns_catalog-images-14.jpg",
                features: [
                    "Stainless-steel collet chuck for a firm grip.",
                    "Double seal construction seals pipe end & OD simultaneously.",
                    "Ideal for Gas charging, Leak testing & vacuum testing."
                ],
                materials: "Stainless steel & Brass",
                fluids: "Refrigerant, Air, Helium, Vacuum"
            },
            {
                id: "tgpl-series",
                category: "tube",
                name: "TGPL Series",
                tag: "Tube-Gripping",
                image: "./assets/microns_catalog-images-16.jpg",
                features: [
                    "Two-stage locking: Thumb lever + 90° handle rotation.",
                    "Seals outer surface perfectly despite OD variations.",
                    "Extremely useful in airtight pressure leak testing."
                ],
                materials: "Brass, Stainless Steel & Aluminium",
                fluids: "Neoprene, Viton, HNBR, Nitrile"
            },
            {
                id: "tcc-series",
                category: "tube",
                name: "TCC Series",
                tag: "Tube-Gripping",
                image: "./assets/microns_catalog-images-19.jpg",
                features: [
                    "Used for helium leak testing & gas charging.",
                    "Double lock mechanism: collet & seal clamp OD/ID.",
                    "Usable on Straight, Expanded, Short & Swaged tubes."
                ],
                materials: "Stainless Steel, Brass & Aluminium",
                fluids: "Refrigerant, Air, Helium, Nitrogen"
            },
            {
                id: "ipc-series",
                category: "tube",
                name: "IPC Series",
                tag: "Internal Clamp",
                image: "./assets/microns_catalog-images-24.jpg",
                features: [
                    "Grips and seals the INNER diameter of pipes.",
                    "Perfect for narrow spaces (Heat Exchangers, Radiators).",
                    "Locked via simple lever up-down movement."
                ],
                materials: "Stainless steel & Aluminium",
                fluids: "Viton, Neoprene, HNBR, Nitrile"
            },
            {
                id: "odu-series",
                category: "auto",
                name: "ODU Series",
                tag: "Service Valves",
                image: "./assets/microns_catalog-images-26.jpg",
                features: [
                    "Swivel connector directly connects to male UNF screws.",
                    "Fitted directly to service valve with tools.",
                    "Supports vacuum of 1.3 x 10^-1 pa."
                ],
                materials: "Stainless steel OR Brass",
                fluids: "Refrigerant Gases, R134a"
            },
            {
                id: "odu-aut",
                category: "auto",
                name: "ODU-AUT Series",
                tag: "Automotive",
                image: "./assets/microns_catalog-images-29.jpg",
                features: [
                    "Claw/jaw grips the screw properly for pressure-tight connection.",
                    "Prevents the use of spanners, reducing fatigue.",
                    "Avoids user's hands from being frostbitten."
                ],
                materials: "Stainless steel OR Brass",
                fluids: "Neoprene, HNBR"
            },
            {
                id: "mas-series",
                category: "highprod",
                name: "MAS Series",
                tag: "Automation",
                image: "./assets/microns_catalog-images-32.jpg",
                features: [
                    "Inbuilt air pressure automated disconnect mechanism.",
                    "Plug separates automatically when air is inserted.",
                    "Ideal for automated lines of refrigerators/ACs."
                ],
                materials: "Stainless steel, Aluminium & Brass",
                fluids: "Viton, Neoprene, HNBR, Nitrile"
            },
            {
                id: "hcg-series",
                category: "highprod",
                name: "HCG & MCG Series",
                tag: "High-Production",
                image: "./assets/microns_catalog-images-34.jpg",
                features: [
                    "Connect & disconnect under high pressures (up to 50kgf/cm2).",
                    "Lever operation: raise vertically to 90° to open valve.",
                    "Inbuilt automatic shut-off valve."
                ],
                materials: "Stainless steel, Aluminium & Brass",
                fluids: "Viton, Neoprene, HNBR"
            },
            {
                id: "pip-aut",
                category: "auto",
                name: "PIP-AUT Series",
                tag: "Automotive",
                image: "./assets/microns_catalog-images-40.jpg",
                features: [
                    "Used in automotive engine leak testing.",
                    "Available with Ball locks (BL), Collets (CL), or Jaws (JW).",
                    "Prevents scratches to soft materials like aluminium."
                ],
                materials: "Stainless Steel, Brass & Aluminium",
                fluids: "Neoprene, Viton, HNBR"
            },
            {
                id: "car-ac",
                category: "auto",
                name: "CAR-AC Series",
                tag: "Automotive",
                image: "./assets/microns_catalog-images-44.jpg",
                features: [
                    "Developed for special shaped pipes in Car ACs.",
                    "One-touch connection / disconnection (push & pull).",
                    "Used for Water, Air, Helium, and Nitrogen leak testing."
                ],
                materials: "Stainless Steel, Brass & Aluminium",
                fluids: "Neoprene, Viton, HNBR, Nitrile"
            }
        ];

        const grid = document.getElementById('product-grid');
        const filters = document.querySelectorAll('.filter-btn');

        // Modal Elements
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("expandedImg");
        const closeBtn = document.getElementsByClassName("close")[0];

        // Render Cards
        function renderProducts(filterCat) {
            grid.innerHTML = '';
            
            const filtered = filterCat === 'all' 
                ? products 
                : products.filter(p => p.category === filterCat);

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img-wrap" onclick="openModal('${p.image}')">
                        <span class="card-badge">${p.tag}</span>
                        <img src="${p.image}" alt="${p.name}" onerror="this.src='./assets/microns_catalog-images-0.jpg'; this.style.opacity='0.2'">
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${p.name}</h3>
                        <div class="card-desc">
                            <ul>
                                ${p.features.map(f => `<li>${f}</li>`).join('')}
                            </ul>
                        </div>
                        <details>
                            <summary>Material Specifications</summary>
                            <div class="details-inner">
                                <table class="specs-table">
                                    <tr>
                                        <th>Body</th>
                                        <td>${p.materials}</td>
                                    </tr>
                                    <tr>
                                        <th>Seals</th>
                                        <td>${p.fluids}</td>
                                    </tr>
                                </table>
                            </div>
                        </details>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Modal Functions
        function openModal(imgSrc) {
            modal.classList.add('show');
            modalImg.src = imgSrc;
            document.body.style.overflow = 'hidden'; // Prevent background scrolling
        }

        function closeModal() {
            modal.classList.remove('show');
            setTimeout(() => { modalImg.src = ''; }, 300); // Clear source after animation
            document.body.style.overflow = 'auto';
        }

        // Event Listeners for Modal
        closeBtn.onclick = closeModal;
        
        modal.onclick = function(e) {
            if (e.target === modal) {
                closeModal();
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal.classList.contains('show')) {
                closeModal();
            }
        });

        // Handle category filtering
        filters.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filters.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderProducts(e.target.dataset.filter);
            });
        });

        // Initial Load
        renderProducts('all');
    </script>
</body>
</html>
