<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sādhana App | Vedic Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --bg: #0f172a;
            --gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            padding-bottom: 90px;
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* --- STICKY TOP NAV (Desktop) --- */
        nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 5%;
            position: sticky; top: 0;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }

        .nav-menu { display: flex; gap: 10px; }
        
        .nav-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

        /* --- MOBILE BOTTOM BAR --- */
        @media (max-width: 768px) {
            nav .nav-menu {
                position: fixed; bottom: 0; left: 0; width: 100%;
                background: #0f172a; border-top: 1px solid var(--border);
                justify-content: space-around; padding: 15px 5px;
            }
            .logo { display: none; }
            .nav-btn { flex: 1; margin: 0 4px; padding: 12px 5px; font-size: 0.7rem; }
        }

        /* --- APP SECTIONS --- */
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 25px; text-align: center; margin-bottom: 20px; }
        img { width: 100%; max-width: 450px; border-radius: 15px; margin-bottom: 20px; }
        audio { width: 100%; filter: invert(1); margin-top: 15px; opacity: 0.8; }
        
        /* Parayana UI */
        #p-ring { fill: none; stroke: var(--gold); stroke-width: 6; stroke-dasharray: 339.29; stroke-dashoffset: 339.29; transform: rotate(-90deg); transform-origin: center; transition: 0.1s linear; }
    </style>
</head>
<body>

<nav>
    <div class="logo serif" style="color: var(--gold); font-size: 1.3rem;">Vedic Space</div>
    <div class="nav-menu">
        <button class="nav-btn active" onclick="showTab('med')">Dhyāna</button>
        <button class="nav-btn" onclick="showTab('pra')">Prāna</button>
        <button class="nav-btn" onclick="showTab('abh')">Abhyāsa</button>
        <button class="nav-btn" onclick="showTab('flow')">Flow</button>
    </div>
</nav>

<div class="container">
    <div id="v-med" class="view active">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Guided Meditations</h1>
        <div class="card">
            <img src="Silver_String.png" alt="Silver String">
            <h3 class="serif">Silver String</h3>
            <audio controls src="audio/silver_string.mp3"></audio>
        </div>
    </div>

    <div id="v-pra" class="view">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Pranayama</h1>
        <div class="card">
            <div style="position:relative; padding-bottom:56.25%; height:0; border-radius:15px; overflow:hidden;">
                <iframe src="https://www.youtube.com/embed/gId_Y69pTf8" style="position:absolute; top:0; left:0; width:100%; height:100%; border:0;"></iframe>
            </div>
            <h3 class="serif" style="margin-top:20px;">Nadi Shodhan</h3>
        </div>
    </div>

    <div id="v-abh" class="view">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Abhyāsa</h1>
        <div class="card">
            <img id="ab-img" src="Slide1.JPG">
            <div style="display:flex; justify-content:center; gap:15px;">
                <button class="nav-btn" onclick="moveAb(-1)">Prev</button>
                <button class="nav-btn" onclick="moveAb(1)">Next</button>
            </div>
        </div>
    </div>

    <div id="v-flow" class="view">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Parayana Flow</h1>
        <div class="card">
            <img id="p-img" src="Slide1.PNG">
            <div style="margin: 20px 0;">
                <svg width="100" height="100" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
                    <circle id="p-ring" cx="60" cy="60" r="54" />
                </svg>
                <h2 id="p-timer" class="serif" style="color:var(--gold);">3.00s</h2>
            </div>
            <button class="nav-btn" style="background:var(--gold); color:black;" onclick="toggleFlow()" id="flow-toggle">Pause</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNODSDmwHVfqt2CSb0tPDZwJGYjov7Lt0",
      authDomain: "vedic-space.firebaseapp.com",
      databaseURL: "https://vedic-space-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "vedic-space",
      storageBucket: "vedic-space.firebasestorage.app",
      messagingSenderId: "465492860613",
      appId: "1:465492860613:web:701d9c3ab0cd4c5a3edaac",
      measurementId: "G-9H9S9RJSNP"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
</script>

<script>
    // Tab Switching
    function showTab(tabId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById('v-' + tabId).classList.add('active');
        // Activate both mobile and desktop buttons
        const btns = document.querySelectorAll('.nav-btn');
        btns.forEach(btn => {
            if(btn.innerText.toLowerCase().includes(tabId.substring(0,3))) btn.classList.add('active');
        });
        window.scrollTo(0,0);
    }

    // Abhyasa Logic
    let abIdx = 1;
    function moveAb(n) {
        abIdx += n;
        if(abIdx < 1) abIdx = 8;
        if(abIdx > 8) abIdx = 1;
        document.getElementById('ab-img').src = `Slide${abIdx}.JPG`;
    }

    // Parayana Engine
    let pIdx = 1, pOn = true, pStart = Date.now(), pDur = 3000;
    function toggleFlow() {
        pOn = !pOn;
        document.getElementById('flow-toggle').innerText = pOn ? "Pause" : "Play";
    }

    function loop() {
        requestAnimationFrame(loop);
        if(!pOn || !document.getElementById('v-flow').classList.contains('active')) return;
        
        let elapsed = Date.now() - pStart;
        let progress = elapsed / pDur;

        if(progress >= 1) {
            pIdx = (pIdx % 112) + 1;
            document.getElementById('p-img').src = `Slide${pIdx}.PNG`;
            pStart = Date.now();
            progress = 0;
        }
        document.getElementById('p-ring').style.strokeDashoffset = 339.29 * (1 - progress);
    }

    loop();
    feather.replace();
</script>
</body>
</html>
