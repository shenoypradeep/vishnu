<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sādhana Dashboard | Vedic Space</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">

    <style>
        /* --- CSS Variables exact matching index.html --- */
        :root {
            --primary-blue: #1e3a8a;
            --deep-blue: #0f172a;
            --accent-gold: #fbbf24;
            --text-light: #f8fafc;
            --text-muted: #cbd5e1;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            --nav-height: 80px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-blue);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(30, 58, 138, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(30, 58, 138, 0.1) 0%, transparent 40%);
            color: var(--text-light);
            min-height: 100vh;
            line-height: 1.6;
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* --- Header matching index.html exactly --- */
        header {
            height: var(--nav-height);
            display: flex;
            align-items: center;
            padding: 0 5%;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            justify-content: space-between;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 35px;
            height: 35px;
            background: var(--accent-gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-blue);
        }

        nav { display: flex; gap: 30px; }
        nav a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.9rem;
            transition: 0.3s;
            opacity: 0.8;
            cursor: pointer;
        }
        nav a:hover, nav a.active { color: var(--accent-gold); opacity: 1; }

        /* --- Layout --- */
        .container {
            max-width: 1200px;
            margin: calc(var(--nav-height) + 40px) auto 60px;
            padding: 0 20px;
        }

        .view-section { display: none; animation: fadeIn 0.6s ease forwards; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .header-content { text-align: center; margin-bottom: 50px; }
        .header-content h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .accent-line { width: 60px; height: 3px; background: var(--accent-gold); margin: 0 auto; }

        /* --- Cards & Grids --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent-gold); box-shadow: var(--card-shadow); }
        .card-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 25px; }
        .card-body h3 { font-size: 1.4rem; margin-bottom: 12px; color: white; }
        .card-body p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }

        /* --- Controls & Players --- */
        audio { width: 100%; filter: invert(1); opacity: 0.8; height: 35px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* --- Abhyasa & Parayana Viewer --- */
        .viewer-wrap { max-width: 900px; margin: 0 auto; position: relative; }
        .swiper { border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .swiper-slide img { width: 100%; display: block; }

        .viewer-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }

        .btn-action {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-action:hover { background: var(--accent-gold); color: var(--deep-blue); }

        /* --- Parayana Specific (Chakra) --- */
        .chakra-ui {
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            padding: 30px;
            margin-top: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            border: 1px solid var(--glass-border);
        }
        #chakra-svg { width: 130px; height: 130px; }
        .ring-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 6; }
        .ring-fill { fill: none; stroke: var(--accent-gold); stroke-width: 6; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; transition: stroke-dashoffset 0.1s linear; }

        /* Mobile Optimization */
        @media (max-width: 768px) {
            header { padding: 0 20px; }
            nav { display: none; } /* Could implement a hamburger menu */
            .header-content h1 { font-size: 1.8rem; }
            .chakra-ui { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <div class="logo-icon"><i data-feather="sun"></i></div>
        Vedic Space
    </a>
    <nav>
        <a onclick="setView('meditations')" id="nav-meditations" class="active">Guided Meditations</a>
        <a onclick="setView('pranayama')" id="nav-pranayama">Pranayama</a>
        <a onclick="setView('abhyasa')" id="nav-abhyasa">Abhyāsa</a>
        <a onclick="setView('parayana')" id="nav-parayana">Parayana</a>
    </nav>
</header>

<main class="container">

    <section id="meditations" class="view-section active">
        <div class="header-content">
            <h1 class="serif">Guided Meditations</h1>
            <p class="serif" style="font-style: italic; opacity: 0.7;">Sacred silence, inner transformation</p>
            <div class="accent-line"></div>
        </div>
        <div class="grid" id="meditation-grid"></div>
    </section>

    <section id="pranayama" class="view-section">
        <div class="header-content">
            <h1 class="serif">Pranayama</h1>
            <p class="serif" style="font-style: italic; opacity: 0.7;">Expansion of Life Force Energy</p>
            <div class="accent-line"></div>
        </div>
        <div class="grid" id="pranayama-grid"></div>
    </section>

    <section id="abhyasa" class="view-section">
        <div class="header-content">
            <h1 class="serif">Abhyāsa Practice</h1>
            <p class="serif" style="font-style: italic; opacity: 0.7;">Refine your pronunciation and flow</p>
            <div class="accent-line"></div>
        </div>
        <div class="viewer-wrap">
            <div class="swiper" id="abhyasa-swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide"><img src="Slide1.JPG"></div>
                    <div class="swiper-slide"><img src="Slide2.JPG"></div>
                </div>
                <div class="swiper-pagination"></div>
            </div>
            <div class="viewer-controls">
                <button class="btn-action" onclick="aSwiper.slidePrev()"><i data-feather="arrow-left"></i> Previous</button>
                <button class="btn-action" onclick="toggleAudio()"><i data-feather="volume-2" id="vol-icon"></i> Audio</button>
                <button class="btn-action" onclick="aSwiper.slideNext()">Next <i data-feather="arrow-right"></i></button>
            </div>
        </div>
    </section>

    <section id="parayana" class="view-section">
        <div class="header-content">
            <h1 class="serif">Parayana Flow</h1>
            <p class="serif" style="font-style: italic; opacity: 0.7;">Continuous Chanting Meditation</p>
            <div class="accent-line"></div>
        </div>
        <div class="viewer-wrap">
            <img id="p-img" src="Slide1.PNG" style="width:100%; border-radius:24px; border:1px solid var(--glass-border);">
            
            <div class="chakra-ui">
                <svg id="chakra-svg" viewBox="0 0 120 120">
                    <circle class="ring-bg" cx="60" cy="60" r="54" />
                    <circle id="p-ring" class="ring-fill" cx="60" cy="60" r="54" stroke-dasharray="339.29" stroke-dashoffset="339.29" />
                </svg>
                
                <div>
                    <h2 id="p-speed-text" class="serif" style="font-size: 2rem; color: var(--accent-gold);">3.00s</h2>
                    <div style="display: flex; gap: 12px; margin-top: 15px;">
                        <button class="btn-action" onclick="adjP(-0.25)"><i data-feather="minus"></i></button>
                        <button class="btn-action" id="p-toggle" onclick="toggleP()"><i data-feather="pause"></i></button>
                        <button class="btn-action" onclick="adjP(0.25)"><i data-feather="plus"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<script>
    // --- Data ---
    const meditations = [
        { title: "Silver String", img: "Silver_String.png", audio: "audio/silver_string.mp3", desc: "Focus on the infinite vertical axis of light within." },
        { title: "Hari Om Chakras", img: "Hari_Om_Chakras.png", audio: "audio/hari_om_meditation.mp3", desc: "Vibrational alignment for the energy centers." },
        { title: "You Are Light", img: "You_Are_The_Light.png", audio: "audio/you_are_the_light.mp3", desc: "A journey to recognize your inherent divinity." }
    ];

    const pranayamas = [
        { title: "Nadi Shodhan", video: "https://www.youtube.com/embed/gId_Y69pTf8", desc: "Purify the energy channels and balance the brain." },
        { title: "Bhastrika Breath", video: "https://www.youtube.com/embed/ET-Z6_XmIas", desc: "The bellows breath for instant focus and energy." }
    ];

    // --- Switcher Logic ---
    function setView(id) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        document.getElementById('nav-' + id).classList.add('active');
        window.scrollTo(0,0);
    }

    // --- Init Grids ---
    const mGrid = document.getElementById('meditation-grid');
    meditations.forEach(m => {
        mGrid.innerHTML += `
            <div class="card">
                <img src="${m.img}" class="card-img">
                <div class="card-body">
                    <h3 class="serif">${m.title}</h3>
                    <p>${m.desc}</p>
                    <audio controls src="${m.audio}"></audio>
                </div>
            </div>`;
    });

    const pGrid = document.getElementById('pranayama-grid');
    pranayamas.forEach(p => {
        pGrid.innerHTML += `
            <div class="card">
                <div class="video-container"><iframe src="${p.video}"></iframe></div>
                <div class="card-body">
                    <h3 class="serif">${p.title}</h3>
                    <p>${p.desc}</p>
                </div>
            </div>`;
    });

    // --- Abhyasa Swiper ---
    const aSwiper = new Swiper('#abhyasa-swiper', { loop: true, pagination: { el: '.swiper-pagination', clickable: true } });
    function toggleAudio() { alert("Audio preferences updated for Abhyāsa."); }

    // --- Parayana Logic ---
    let pIdx = 1, pDur = 3000, pActive = true, pStart = performance.now();
    const pRing = document.getElementById('p-ring'), pImg = document.getElementById('p-img');
    
    function toggleP() {
        pActive = !pActive;
        document.getElementById('p-toggle').innerHTML = pActive ? '<i data-feather="pause"></i>' : '<i data-feather="play"></i>';
        feather.replace();
        if(pActive) pStart = performance.now();
    }
    
    function adjP(val) { 
        pDur += (val * 1000); if(pDur < 500) pDur = 500; 
        document.getElementById('p-speed-text').innerText = (pDur/1000).toFixed(2) + 's';
    }

    function loopParayana() {
        requestAnimationFrame(loopParayana);
        if(!pActive) return;
        let elapsed = performance.now() - pStart;
        let progress = elapsed / pDur;
        if(progress >= 1) {
            pIdx = (pIdx % 112) + 1;
            pImg.src = `Slide${pIdx}.PNG`;
            pStart = performance.now();
            progress = 0;
        }
        pRing.style.strokeDashoffset = 339.29 * (1 - progress);
    }

    // Start
    loopParayana();
    feather.replace();
</script>

</body>
</html>
