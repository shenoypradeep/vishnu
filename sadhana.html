<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sādhana App | Vedic Space</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">

    <style>
        /* --- EXACT CSS VARIABLES & BRANDING FROM INDEX.HTML --- */
        :root {
            --primary-blue: #1e3a8a;
            --deep-blue: #0f172a;
            --accent-gold: #fbbf24;
            --text-light: #f8fafc;
            --text-muted: #cbd5e1;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --nav-height: 80px;
            --m-nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-blue);
            /* Exact Radial Gradient from index.html */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(30, 58, 138, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(30, 58, 138, 0.1) 0%, transparent 40%);
            color: var(--text-light);
            min-height: 100vh;
            line-height: 1.6;
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* --- HEADER & NAVIGATION --- */
        header {
            height: var(--nav-height);
            display: flex;
            align-items: center;
            padding: 0 5%;
            position: fixed;
            top: 0; width: 100%;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            justify-content: space-between;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem; font-weight: 700;
            color: white; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: var(--accent-gold);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--deep-blue);
        }

        /* Desktop Nav - Hidden on Mobile */
        .desktop-nav { display: flex; gap: 25px; }
        .desktop-nav a {
            text-decoration: none; color: var(--text-light);
            font-weight: 500; font-size: 0.9rem;
            opacity: 0.7; transition: 0.3s; cursor: pointer;
        }
        .desktop-nav a.active { opacity: 1; color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); }

        /* Mobile Bottom Nav - Visible only on Mobile */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0; width: 100%; height: var(--m-nav-height);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
            justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .m-nav-link {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-muted); text-decoration: none; font-size: 0.65rem;
            gap: 4px; transition: 0.3s;
        }
        .m-nav-link.active { color: var(--accent-gold); }
        .m-nav-link i { width: 20px; height: 20px; }

        /* --- CONTENT WRAPPER --- */
        .container {
            max-width: 1200px;
            margin: calc(var(--nav-height) + 40px) auto 100px;
            padding: 0 20px;
        }

        .section-view { display: none; animation: fadeIn 0.4s ease forwards; }
        .section-view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .title-block { text-align: center; margin-bottom: 40px; }
        .title-block h1 { font-size: 2.5rem; margin-bottom: 8px; }
        .divider { width: 40px; height: 3px; background: var(--accent-gold); margin: 15px auto; }

        /* --- UI COMPONENTS --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .pane {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
        }
        .pane:hover { border-color: var(--accent-gold); }

        audio { width: 100%; filter: invert(1); height: 35px; opacity: 0.7; margin-top: 10px; }

        /* Parayana Chakra */
        .chakra-box {
            background: rgba(0,0,0,0.2);
            border-radius: 24px; padding: 30px;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            border: 1px solid var(--glass-border);
            max-width: 500px; margin: 30px auto;
        }
        .ring-progress { fill: none; stroke: var(--accent-gold); stroke-width: 6; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; transition: 0.1s linear; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .mobile-nav { display: flex; }
            .title-block h1 { font-size: 1.8rem; }
            .container { margin-top: calc(var(--nav-height) + 10px); }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <div class="logo-icon"><i data-feather="sun"></i></div>
        Vedic Space
    </a>
    <nav class="desktop-nav">
        <a onclick="show('med')" id="d-med" class="active">Meditations</a>
        <a onclick="show('pran')" id="d-pran">Pranayama</a>
        <a onclick="show('abhy')" id="d-abhy">Abhyāsa</a>
        <a onclick="show('para')" id="d-para">Parayana</a>
    </nav>
</header>

<nav class="mobile-nav">
    <a onclick="show('med')" id="m-med" class="m-nav-link active"><i data-feather="wind"></i>Dhyāna</a>
    <a onclick="show('pran')" id="m-pran" class="m-nav-link"><i data-feather="activity"></i>Prana</a>
    <a onclick="show('abhy')" id="m-abhy" class="m-nav-link"><i data-feather="book-open"></i>Abhyāsa</a>
    <a onclick="show('para')" id="m-para" class="m-nav-link"><i data-feather="repeat"></i>Parayana</a>
</nav>

<main class="container">
    
    <section id="view-med" class="section-view active">
        <div class="title-block">
            <h1 class="serif">Guided Meditations</h1>
            <div class="divider"></div>
        </div>
        <div class="grid" id="med-grid">
            <div class="pane">
                <img src="Silver_String.png" style="width:100%">
                <div style="padding:20px;">
                    <h3 class="serif">Silver String</h3>
                    <p style="font-size:0.9rem; color:var(--text-muted);">Guided dhyāna for alignment.</p>
                    <audio controls src="audio/silver_string.mp3"></audio>
                </div>
            </div>
        </div>
    </section>

    <section id="view-para" class="section-view">
        <div class="title-block">
            <h1 class="serif">Parayana</h1>
            <div class="divider"></div>
        </div>
        <div class="chakra-box">
            <img id="p-img" src="Slide1.PNG" style="width:100%; border-radius:12px; border:1px solid var(--glass-border);">
            <svg width="100" height="100" viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6"/>
                <circle id="p-ring" class="ring-progress" cx="60" cy="60" r="54" stroke-dasharray="339.29" stroke-dashoffset="339.29"/>
            </svg>
            <button onclick="toggleP()" id="p-btn" style="background:var(--accent-gold); color:var(--deep-blue); border:none; padding:12px 30px; border-radius:30px; font-weight:700; cursor:pointer;">Pause</button>
        </div>
    </section>

    <section id="view-pran" class="section-view"><div class="title-block"><h1 class="serif">Pranayama</h1></div></section>
    <section id="view-abhy" class="section-view"><div class="title-block"><h1 class="serif">Abhyāsa</h1></div></section>

</main>

<script>
    // Navigation Control
    function show(id) {
        // Remove active states from all views and links
        document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.desktop-nav a, .m-nav-link').forEach(l => l.classList.remove('active'));

        // Activate selected
        document.getElementById('view-' + id).classList.add('active');
        document.getElementById('d-' + id).classList.add('active');
        document.getElementById('m-' + id).classList.add('active');
        
        window.scrollTo(0,0);
    }

    // Parayana Engine
    let pIdx = 1, pDur = 3000, pOn = true, pStart = performance.now();
    function toggleP() { pOn = !pOn; document.getElementById('p-btn').innerText = pOn ? "Pause" : "Play"; if(pOn) pStart = performance.now(); }

    function loop() {
        requestAnimationFrame(loop);
        if(!pOn || !document.getElementById('view-para').classList.contains('active')) return;
        let progress = (performance.now() - pStart) / pDur;
        if(progress >= 1) {
            pIdx = (pIdx % 112) + 1;
            document.getElementById('p-img').src = `Slide${pIdx}.PNG`;
            pStart = performance.now(); progress = 0;
        }
        document.getElementById('p-ring').style.strokeDashoffset = 339.29 * (1 - progress);
    }

    loop();
    feather.replace();
</script>

</body>
</html>
