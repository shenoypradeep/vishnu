<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sādhana | Vedic Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">

    <style>
        :root {
            --deep-blue: #0f172a;
            --accent-gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--deep-blue);
            background-image: radial-gradient(circle at 50% 50%, #1e3a8a33 0%, transparent 70%);
            color: white;
            min-height: 100vh;
            padding-bottom: 90px; /* Space for mobile nav */
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* --- FIXED NAVIGATION --- */
        header {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-links { display: flex; gap: 20px; margin-left: auto; }
        .nav-links a { 
            color: #cbd5e1; text-decoration: none; font-size: 0.85rem; 
            cursor: pointer; padding: 5px 10px;
        }
        .nav-links a.active { color: var(--accent-gold); font-weight: 600; }

        /* Mobile Nav Bar - Always visible on small screens */
        .mobile-bar {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: rgba(15, 23, 42, 0.95);
            display: none; justify-content: space-around; align-items: center;
            border-top: 1px solid var(--border); z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- VIEWS --- */
        .view { display: none; padding: 30px 20px; max-width: 1200px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- PANE STYLES --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .pane { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 20px; transition: 0.3s; }
        .pane:hover { border-color: var(--accent-gold); }
        .pane img { width: 100%; border-radius: 12px; margin-bottom: 15px; }
        
        audio { width: 100%; filter: invert(1); height: 35px; margin-top: 15px; }

        /* --- CHANTER & SWIPER --- */
        .swiper { border-radius: 20px; width: 100%; max-width: 800px; }
        .chanter-ui { text-align: center; background: rgba(0,0,0,0.2); padding: 30px; border-radius: 30px; margin-top: 20px; }
        #p-ring { fill: none; stroke: var(--accent-gold); stroke-width: 6; transform: rotate(-90deg); transform-origin: center; transition: 0.1s linear; }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-bar { display: flex; }
            .view { padding-top: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo serif" style="font-size: 1.2rem; color: var(--accent-gold);">Vedic Space</div>
    <div class="nav-links">
        <a onclick="show('med')" id="d-med" class="active">Meditation</a>
        <a onclick="show('pra')" id="d-pra">Pranayama</a>
        <a onclick="show('abh')" id="d-abh">Abhyāsa</a>
        <a onclick="show('par')" id="d-par">Parayana</a>
    </div>
</header>

<nav class="mobile-bar">
    <a onclick="show('med')" id="m-med" style="color:var(--accent-gold);"><i data-feather="wind"></i></a>
    <a onclick="show('pra')" id="m-pra" style="color:#fff;"><i data-feather="activity"></i></a>
    <a onclick="show('abh')" id="m-abh" style="color:#fff;"><i data-feather="book-open"></i></a>
    <a onclick="show('par')" id="m-par" style="color:#fff;"><i data-feather="repeat"></i></a>
</nav>

<div class="container">
    <section id="v-med" class="view active">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Guided Meditations</h1>
        <div class="grid">
            <div class="pane">
                <img src="Silver_String.png">
                <h3 class="serif">Silver String</h3>
                <audio controls src="audio/silver_string.mp3"></audio>
            </div>
            <div class="pane">
                <img src="Hari_Om_Chakras.png">
                <h3 class="serif">Hari Om Chakras</h3>
                <audio controls src="audio/hari_om_meditation.mp3"></audio>
            </div>
        </div>
    </section>

    <section id="v-pra" class="view">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Pranayama</h1>
        <div class="grid">
            <div class="pane">
                <div style="padding-bottom:56%; position:relative;">
                    <iframe src="https://www.youtube.com/embed/gId_Y69pTf8" style="position:absolute; width:100%; height:100%; border:0; border-radius:12px;"></iframe>
                </div>
                <h3 class="serif" style="margin-top:15px;">Nadi Shodhan</h3>
            </div>
        </div>
    </section>

    <section id="v-abh" class="view">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Abhyāsa Room</h1>
        <div class="swiper" id="abSwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="Slide1.JPG" style="width:100%"></div>
                <div class="swiper-slide"><img src="Slide2.JPG" style="width:100%"></div>
            </div>
        </div>
    </section>

    <section id="v-par" class="view">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Parayana Flow</h1>
        <div class="chanter-ui">
            <img id="p-img" src="Slide1.PNG" style="width:100%; max-width:400px; border-radius:15px; margin-bottom:20px;">
            <br>
            <svg width="80" height="80" viewBox="0 0 120 120">
                <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
                <circle id="p-ring" cx="60" cy="60" r="54" stroke-dasharray="339.29" stroke-dashoffset="339.29"/>
            </svg>
            <h2 id="p-time" class="serif">3.00s</h2>
            <button onclick="pOn=!pOn" style="background:var(--accent-gold); border:none; padding:10px 30px; border-radius:20px; font-weight:bold; margin-top:15px;">Play/Pause</button>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<script>
    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-links a, .mobile-bar a').forEach(a => a.style.color = "#fff");
        
        document.getElementById('v-' + id).classList.add('active');
        document.getElementById('d-' + id).style.color = "#fbbf24";
        document.getElementById('m-' + id).style.color = "#fbbf24";
        window.scrollTo(0,0);
    }

    let pIdx = 1, pDur = 3000, pOn = true, pStart = performance.now();
    function tick() {
        requestAnimationFrame(tick);
        if(!pOn || !document.getElementById('v-par').classList.contains('active')) return;
        let progress = (performance.now() - pStart) / pDur;
        if(progress >= 1) {
            pIdx = (pIdx % 112) + 1;
            document.getElementById('p-img').src = `Slide${pIdx}.PNG`;
            pStart = performance.now(); progress = 0;
        }
        document.getElementById('p-ring').style.strokeDashoffset = 339.29 * (1 - progress);
    }

    new Swiper('#abSwiper', { loop: true });
    tick();
    feather.replace();
</script>
</body>
</html>
