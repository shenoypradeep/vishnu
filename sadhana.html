<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sādhana App| Vedic Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">

    <style>
        :root {
            --deep-blue: #0f172a;
            --accent-gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--deep-blue);
            background-image: radial-gradient(circle at 50% 50%, #1e3a8a33 0%, transparent 70%);
            color: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* HEADER / DESKTOP NAV */
        header {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .desktop-nav { display: flex; gap: 20px; margin-left: auto; }
        .desktop-nav a { color: #cbd5e1; text-decoration: none; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .desktop-nav a.active { color: var(--accent-gold); font-weight: 600; }

        /* MOBILE NAV */
        .mobile-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #0f172a; border-top: 1px solid var(--border);
            display: none; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .mobile-nav a { color: #cbd5e1; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.6rem; gap: 4px; }
        .mobile-nav a.active { color: var(--accent-gold); }

        /* SECTIONS */
        .view-section { display: none; padding: 40px 20px; max-width: 1000px; margin: 0 auto; }
        .view-section.active { display: block; }

        .pane { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        audio { width: 100%; filter: invert(1); margin-top: 15px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .mobile-nav { display: flex; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo serif" style="color: var(--accent-gold); font-size: 1.2rem;">Vedic Space</div>
    <div class="desktop-nav">
        <a onclick="show('med')" id="d-med" class="active">Meditation</a>
        <a onclick="show('pra')" id="d-pra">Pranayama</a>
        <a onclick="show('abh')" id="d-abh">Abhyāsa</a>
        <a onclick="show('par')" id="d-par">Parayana</a>
    </div>
</header>

<nav class="mobile-nav">
    <a onclick="show('med')" id="m-med" class="active"><i data-feather="wind"></i>Dhyāna</a>
    <a onclick="show('pra')" id="m-pra"><i data-feather="activity"></i>Prana</a>
    <a onclick="show('abh')" id="m-abh"><i data-feather="book-open"></i>Abhyāsa</a>
    <a onclick="show('par')" id="m-par"><i data-feather="repeat"></i>Flow</a>
</nav>

<main>
    <section id="v-med" class="view-section active">
        <h2 class="serif" style="text-align:center; margin-bottom:30px;">Guided Meditations</h2>
        <div class="grid">
            <div class="pane">
                <img src="Silver_String.png" style="width:100%; border-radius:12px;">
                <h3 class="serif" style="margin-top:15px;">Silver String</h3>
                <audio controls src="audio/silver_string.mp3"></audio>
            </div>
        </div>
    </section>

    <section id="v-pra" class="view-section">
        <h2 class="serif" style="text-align:center; margin-bottom:30px;">Pranayama</h2>
        <div class="pane">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/gId_Y69pTf8"></iframe>
            </div>
            <h3 class="serif" style="margin-top:15px;">Nadi Shodhan</h3>
        </div>
    </section>

    <section id="v-abh" class="view-section">
        <h2 class="serif" style="text-align:center; margin-bottom:30px;">Abhyāsa Room</h2>
        <div class="swiper" id="abSwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="Slide1.JPG" style="width:100%; border-radius:20px;"></div>
                <div class="swiper-slide"><img src="Slide2.JPG" style="width:100%; border-radius:20px;"></div>
            </div>
        </div>
    </section>

    <section id="v-par" class="view-section">
        <h2 class="serif" style="text-align:center; margin-bottom:30px;">Parayana Flow</h2>
        <div class="pane" style="text-align:center;">
            <img id="p-img" src="Slide1.PNG" style="width:100%; max-width:400px; border-radius:15px;">
            <div style="margin-top:20px;">
                <svg width="80" height="80" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
                    <circle id="p-ring" cx="60" cy="60" r="54" fill="none" stroke="#fbbf24" stroke-width="6" stroke-dasharray="339.29" stroke-dashoffset="339.29" transform="rotate(-90 60 60)"/>
                </svg>
                <h3 id="p-time" class="serif">3.00s</h3>
                <button onclick="pOn=!pOn" style="background:#fbbf24; border:none; padding:10px 25px; border-radius:20px; font-weight:bold; margin-top:10px;">Play/Pause</button>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<script>
    function show(id) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.desktop-nav a, .mobile-nav a').forEach(a => a.classList.remove('active'));
        
        document.getElementById('v-' + id).classList.add('active');
        document.getElementById('d-' + id).classList.add('active');
        document.getElementById('m-' + id).classList.add('active');
        window.scrollTo(0,0);
    }

    let pIdx = 1, pDur = 3000, pOn = true, pStart = performance.now();
    function tick() {
        requestAnimationFrame(tick);
        if(!pOn || !document.getElementById('v-par').classList.contains('active')) return;
        let progress = (performance.now() - pStart) / pDur;
        if(progress >= 1) {
            pIdx = (pIdx % 112) + 1;
            document.getElementById('p-img').src = `Slide${pIdx}.PNG`;
            pStart = performance.now(); progress = 0;
        }
        document.getElementById('p-ring').style.strokeDashoffset = 339.29 * (1 - progress);
    }

    new Swiper('#abSwiper', { loop: true });
    tick();
    feather.replace();

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDNODSDmwHVfqt2CSb0tPDZwJGYjov7Lt0",
  authDomain: "vedic-space.firebaseapp.com",
  projectId: "vedic-space",
  storageBucket: "vedic-space.firebasestorage.app",
  messagingSenderId: "465492860613",
  appId: "1:465492860613:web:701d9c3ab0cd4c5a3edaac",
  measurementId: "G-9H9S9RJSNP"
};

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const analytics = getAnalytics(app);

  // --- Dynamic Content Loader ---
  async function loadMeditations() {
    const querySnapshot = await getDocs(collection(db, "meditations"));
    const grid = document.querySelector('#v-med .grid');
    grid.innerHTML = ''; // Clear loader

    querySnapshot.forEach((doc) => {
      const data = doc.data();
      grid.innerHTML += `
        <div class="pane">
            <img src="${data.image_url}" style="width:100%; border-radius:12px;">
            <h3 class="serif" style="margin-top:15px;">${data.title}</h3>
            <audio controls src="${data.audio_url}"></audio>
        </div>`;
    });
  }

  // Initial Load
  window.addEventListener('DOMContentLoaded', () => {
    loadMeditations();
  });
</script>
</script>
</body>
</html>
