<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sādhana App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root { --bg: #1e3a8a; --gold: #fbbf24; --glass: rgba(255, 255, 255, 0.07); --border: rgba(251, 191, 36, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding-bottom: 80px; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Header */
        .header { position: sticky; top: 0; background: rgba(30, 58, 138, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        
        /* Containers */
        .content { padding: 20px; max-width: 800px; margin: auto; }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Cards */
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
        .card-body { padding: 15px; text-align: center; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        /* Mobile Nav */
        .mobile-nav { position: fixed; bottom: 0; width: 100%; background: #1e3a8a; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px; }
        .nav-item { color: white; opacity: 0.6; display: flex; flex-direction: column; align-items: center; font-size: 10px; cursor: pointer; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        
        /* Flow Visuals */
        #p-ring { fill: none; stroke: var(--gold); stroke-width: 6; stroke-dasharray: 339.29; stroke-dashoffset: 339.29; transform: rotate(-90deg); transform-origin: center; transition: 0.1s linear; }
    </style>
</head>
<body>

    <header class="header">
        <h2 class="serif">Sādhana</h2>
        <i data-feather="user" onclick="window.location.href='login.html'"></i>
    </header>

    <div class="content">
        <!-- Meditations -->
        <section id="v-med" class="view active">
            <div id="medGrid"></div>
        </section>

        <!-- Pranayama -->
        <section id="v-pran" class="view">
            <div id="pranGrid"></div>
        </section>

        <!-- Parayana Flow -->
        <section id="v-flow" class="view">
            <div class="card" style="padding: 40px 20px; text-align: center;">
                <img id="flow-slide" src="Slide1.PNG" style="width: 250px; border-radius: 15px; margin-bottom: 20px;">
                <div style="position: relative; width: 100px; height: 100px; margin: auto;">
                    <svg width="100" height="100"><circle cx="50" cy="50" r="45" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/><circle id="p-ring" cx="50" cy="50" r="45"/></svg>
                    <div id="p-timer" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--gold); font-weight:700;">3.0s</div>
                </div>
                <button onclick="pOn = !pOn" style="margin-top:20px; padding:10px 30px; border-radius:20px; border:none; background:var(--gold); font-weight:700;">PAUSE / PLAY</button>
            </div>
        </section>
    </div>

    <nav class="mobile-nav">
        <div class="nav-item active" onclick="showTab('med')" id="n-med"><i data-feather="moon"></i>Dhyāna</div>
        <div class="nav-item" onclick="showTab('pran')" id="n-pran"><i data-feather="wind"></i>Prāṇa</div>
        <div class="nav-item" onclick="showTab('flow')" id="n-flow"><i data-feather="refresh-cw"></i>Flow</div>
    </nav>

    <script>
        const meditations = [
            {title: "Presence", audio: "audio/presence.mp3", img: "Silver_String.png"}
        ];

        const pranayamas = [
            {title: "Nadi Shodhan", video: "https://www.youtube.com/embed/Biry04x7rFM"}
        ];

        function showTab(t) {
            document.querySelectorAll('.view, .nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('v-' + t).classList.add('active');
            document.getElementById('n-' + t).classList.add('active');
        }

        function renderAll() {
            // Meditations
            document.getElementById('medGrid').innerHTML = meditations.map(m => `
                <div class="card">
                    <img src="${m.img}" style="width:100%; height:180px; object-fit:cover;">
                    <div class="card-body"><h3 class="serif">${m.title}</h3><audio controls src="${m.audio}" style="width:100%; filter:invert(1); margin-top:10px;"></audio></div>
                </div>`).join('');

            // Pranayama (SMART CARD FIX)
            document.getElementById('pranGrid').innerHTML = pranayamas.map(p => {
                const vidId = p.video.split('/').pop();
                return `
                <div class="card">
                    <div class="video-box"><iframe src="${p.video}" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></div>
                    <div class="card-body">
                        <h3 class="serif">${p.title}</h3>
                        <a href="https://youtube.com/watch?v=${vidId}" target="_blank" style="color:var(--gold); font-size:0.8rem; text-decoration:none; margin-top:10px; display:block;">
                            <i data-feather="external-link" style="width:12px;"></i> Watch on YouTube (if blocked)
                        </a>
                    </div>
                </div>`;
            }).join('');
            feather.replace();
        }

        // Flow Timer logic
        let pIdx = 1, pOn = true, pStart = Date.now();
        function flowLoop() {
            if(pOn && document.getElementById('v-flow').classList.contains('active')) {
                let progress = (Date.now() - pStart) / 3000;
                if(progress >= 1) { 
                    pIdx = (pIdx % 112) + 1; 
                    document.getElementById('flow-slide').src = `Slide${pIdx}.PNG`;
                    pStart = Date.now(); progress = 0;
                }
                document.getElementById('p-ring').style.strokeDashoffset = 339.29 * (1 - progress);
                document.getElementById('p-timer').innerText = (3 * (1 - progress)).toFixed(1) + 's';
            }
            requestAnimationFrame(flowLoop);
        }

        window.onload = () => { renderAll(); flowLoop(); };
    </script>
</body>
</html>
