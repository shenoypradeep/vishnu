<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sādhana Appp | Vedic Space</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --bg: #0f172a;
            --gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px; /* Essential for mobile nav clearance */
        }

        .serif { font-family: 'Playfair Display', serif; }

        /* --- NAVIGATION --- */
        header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 15px 5%;
            position: sticky; top: 0;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }

        .nav-menu { display: flex; gap: 12px; }
        
        .nav-btn {
            background: var(--glass);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .nav-btn.active { background: var(--gold); color: var(--bg); border-color: var(--gold); }

        /* --- MOBILE BOTTOM NAV --- */
        @media (max-width: 768px) {
            header .nav-menu {
                position: fixed; bottom: 0; left: 0; width: 100%;
                background: #0f172a; border-top: 1px solid var(--border);
                justify-content: space-around; padding: 15px 10px;
                z-index: 9999;
            }
            .logo { display: none; }
            .nav-btn { flex: 1; margin: 0 4px; padding: 12px 5px; font-size: 0.65rem; }
        }

        /* --- CONTENT WRAPPER --- */
        .container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        
        /* Ensure sections are hidden by default via JS, not just CSS */
        .app-section { display: none; } 

        .card { 
            background: var(--glass); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 25px; 
            text-align: center; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        img { width: 100%; max-width: 450px; border-radius: 15px; margin-bottom: 20px; }
        audio { width: 100%; filter: invert(1); margin-top: 15px; }

        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 15px; overflow: hidden; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        #p-ring { fill: none; stroke: var(--gold); stroke-width: 6; stroke-dasharray: 339.29; stroke-dashoffset: 339.29; transform: rotate(-90deg); transform-origin: center; transition: 0.1s linear; }
    </style>
</head>
<body>

<header>
    <div class="logo serif" style="color: var(--gold); font-size: 1.3rem;">Vedic Space</div>
    <div class="nav-menu">
        <button class="nav-btn active" id="btn-med" onclick="switchView('med')">Dhyāna</button>
        <button class="nav-btn" id="btn-pra" onclick="switchView('pra')">Prāna</button>
        <button class="nav-btn" id="btn-abh" onclick="switchView('abh')">Abhyāsa</button>
        <button class="nav-btn" id="btn-flow" onclick="switchView('flow')">Flow</button>
    </div>
</header>

<div class="container">
    <div id="view-med" class="app-section" style="display: block;">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Guided Meditations</h1>
        <div class="card">
            <img src="Silver_String.png">
            <h3 class="serif">Silver String</h3>
            <audio controls src="audio/silver_string.mp3"></audio>
        </div>
    </div>

    <div id="view-pra" class="app-section">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Pranayama</h1>
        <div class="card">
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/gId_Y69pTf8"></iframe>
            </div>
            <h3 class="serif" style="margin-top:20px;">Nadi Shodhan</h3>
        </div>
    </div>

    <div id="view-abh" class="app-section">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Abhyāsa Room</h1>
        <div class="card">
            <img id="ab-img" src="Slide1.JPG">
            <div style="display:flex; justify-content:center; gap:15px;">
                <button class="nav-btn" onclick="navAb(-1)">Prev</button>
                <button class="nav-btn" onclick="navAb(1)">Next</button>
            </div>
        </div>
    </div>

    <div id="view-flow" class="app-section">
        <h1 class="serif" style="text-align:center; margin-bottom:30px;">Parayana Flow</h1>
        <div class="card">
            <img id="p-img" src="Slide1.PNG">
            <div style="margin: 20px 0;">
                <svg width="100" height="100" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="6"/>
                    <circle id="p-ring" cx="60" cy="60" r="54" />
                </svg>
                <h2 id="p-timer" class="serif" style="color:var(--gold);">3.00s</h2>
            </div>
            <button class="nav-btn" style="background:var(--gold); color:black;" onclick="toggleP()" id="p-control">Pause</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDNODSDmwHVfqt2CSb0tPDZwJGYjov7Lt0",
      authDomain: "vedic-space.firebaseapp.com",
      databaseURL: "https://vedic-space-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "vedic-space",
      storageBucket: "vedic-space.firebasestorage.app",
      messagingSenderId: "465492860613",
      appId: "1:465492860613:web:701d9c3ab0cd4c5a3edaac",
      measurementId: "G-9H9S9RJSNP"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
</script>

<script>
    // 1. Navigation Controller
    function switchView(viewId) {
        // Hide all
        const sections = document.getElementsByClassName('app-section');
        for (let s of sections) { s.style.display = 'none'; }
        
        const btns = document.getElementsByClassName('nav-btn');
        for (let b of btns) { b.classList.remove('active'); }

        // Show target
        document.getElementById('view-' + viewId).style.display = 'block';
        document.getElementById('btn-' + viewId).classList.add('active');
        
        window.scrollTo(0,0);
    }

    // 2. Abhyasa Controls
    let abIdx = 1;
    function navAb(step) {
        abIdx += step;
        if(abIdx < 1) abIdx = 8;
        if(abIdx > 8) abIdx = 1;
        document.getElementById('ab-img').src = `Slide${abIdx}.JPG`;
    }

    // 3. Parayana Engine
    let pIdx = 1, pActive = true, pStart = Date.now(), pDuration = 3000;
    
    function toggleP() {
        pActive = !pActive;
        document.getElementById('p-control').innerText = pActive ? "Pause" : "Play";
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Only run if the Flow section is visible
        if(!pActive || document.getElementById('view-flow').style.display !== 'block') return;

        let elapsed = Date.now() - pStart;
        let progress = elapsed / pDuration;

        if(progress >= 1) {
            pIdx = (pIdx % 112) + 1;
            document.getElementById('p-img').src = `Slide${pIdx}.PNG`;
            pStart = Date.now();
            progress = 0;
        }

        const ring = document.getElementById('p-ring');
        if(ring) {
            ring.style.strokeDashoffset = 339.29 * (1 - progress);
        }
    }

    // Start the loop
    animate();
    
    // Initialize icons
    window.onload = () => { if(window.feather) feather.replace(); };
</script>

</body>
</html>
