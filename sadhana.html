    <style>
        :root { --bg: #1e3a8a; --gold: #fbbf24; --glass: rgba(255, 255, 255, 0.07); --border: rgba(251, 191, 36, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding-bottom: 90px; }
        body.chat-open { overflow: hidden; } 
        
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Matched to reference HTML */
        .header { position: sticky; top: 0; background: rgba(30, 58, 138, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; border-bottom: 1px solid var(--border); z-index: 100; }
        .nav-links { display: none; gap: 25px; list-style: none; margin: 0; padding: 0; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; font-size: 13px; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s; cursor: pointer; }
        .nav-links a:hover, .nav-links a.active-link { color: var(--gold); }
        
        .content { padding: 10px; max-width: 800px; margin: auto; padding-left: env(safe-area-inset-left, 10px); padding-right: env(safe-area-inset-right, 10px); }
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .search-input { width: 100%; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 12px 15px; color: white; font-size: 14px; outline: none; transition: border 0.3s; font-family: inherit; resize: vertical; box-sizing: border-box; }
        .search-input:focus { border-color: var(--gold); }

        .mandala-grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 5px; margin-top: 15px; }
        .day-square { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .day-square.completed { background: var(--gold); color: var(--bg); font-weight: bold; border-color: var(--gold); box-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
        .day-square.special { border: 2px solid #ff4757; color: #ff4757; font-weight: bold; }
        
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 20px; padding: 20px; }
        .card-body { padding: 15px; text-align: center; }
        .video-box { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* Interactive Wheel Picker */
        .interactive-picker { background: var(--glass); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 20px; overflow: hidden; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .picker-search-bar { display: flex; align-items: center; padding: 14px 15px; gap: 10px; background: rgba(0,0,0,0.2); position: relative; z-index: 2; }
        .picker-search-bar input { flex: 1; background: transparent; border: none; color: var(--gold); font-size: 15px; font-weight: 600; outline: none; font-family: 'Inter', sans-serif; text-overflow: ellipsis; }
        .picker-search-bar input::placeholder { color: rgba(255,255,255,0.6); font-weight: 400; }
        .picker-wheel-area { height: 0; position: relative; transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0; }
        .interactive-picker.expanded .picker-wheel-area { height: 150px; opacity: 1; }
        .picker-wheel { height: 100%; overflow-y: auto; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .picker-wheel::-webkit-scrollbar { display: none; }
        .wheel-pad { height: 55px; } 
        .wheel-item { height: 40px; display: flex; align-items: center; justify-content: center; scroll-snap-align: center; font-size: 15px; color: white; opacity: 0.4; transition: all 0.2s; cursor: pointer; text-align: center; padding: 0 20px; font-family: 'Inter', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .wheel-item.active { opacity: 1; color: var(--gold); font-weight: bold; transform: scale(1.08); }
        .picker-highlight { position: absolute; top: 55px; left: 15px; right: 15px; height: 40px; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); background: rgba(251, 191, 36, 0.1); border-radius: 8px; pointer-events: none; z-index: 1; }
        .media-display { animation: scaleIn 0.4s ease; transform-origin: top center; }

        /* Custom Sādhanā Slider UI */
        .metric-card { margin-bottom: 30px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .metric-label-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 13px; font-weight: 600; color: white; font-family: 'Inter', sans-serif; }
        .metric-label-row .active-state-text { color: var(--gold); font-weight: bold; font-family: 'Inter', sans-serif; }
        .slider-container { display: flex; flex-direction: column; gap: 8px; }
        .metric-slider { width: 100%; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.2); height: 6px; border-radius: 5px; outline: none; margin: 10px 0; }
        .metric-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--gold); cursor: pointer; transition: transform 0.1s; border: 3px solid var(--bg); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .metric-slider::-moz-range-thumb { width: 22px; height: 22px; border-radius: 50%; background: var(--gold); cursor: pointer; transition: transform 0.1s; border: 3px solid var(--bg); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .metric-slider::-webkit-slider-thumb:active { transform: scale(1.2); }
        .metric-slider::-moz-range-thumb:active { transform: scale(1.2); }
        .slider-labels { display: flex; justify-content: space-between; font-size: 10px; color: rgba(255,255,255,0.4); text-align: center; margin-top: -5px; }
        .slider-labels span { flex: 1; display: flex; flex-direction: column; align-items: center; word-wrap: break-word; padding: 0 2px; line-height: 1.2; transition: 0.3s; font-family: 'Inter', sans-serif; }
        .slider-labels span::before { content: '|'; display: block; margin-bottom: 4px; color: rgba(255,255,255,0.2); font-size: 10px; font-weight: bold; }
        .slider-labels span.active-label { color: var(--gold); font-weight: 600; transform: scale(1.05); }
        .slider-labels span.active-label::before { color: var(--gold); }
        .sara-score-badge { display: inline-block; padding: 8px 20px; border-radius: 30px; background: rgba(251, 191, 36, 0.15); border: 1px solid var(--border); color: var(--gold); font-weight: bold; font-size: 28px; margin-bottom: 5px; }
        
        /* Layouts & Fullscreen matching reference */
        #p-ring-new { fill: none; stroke: var(--gold); stroke-width: 5; stroke-dasharray: 219.9; stroke-dashoffset: 219.9; transform: rotate(-90deg); transform-origin: center; transition: 0.1s linear; }
        #jaas-container { width: 100%; height: 60vh; border-radius: 15px; overflow: hidden; background: #000; }

        /* Flow Pane: Fill space, match reference precisely */
        #flow-container:fullscreen, #learn-container:fullscreen { background: var(--bg) !important; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0; width: 100vw; height: 100vh; }
        #flow-container:fullscreen .slide-wrapper { width: 100vw; height: 100vh; max-height: 100vh; aspect-ratio: auto; border-radius: 0; }
        #learn-container:fullscreen .slide-wrapper { width: 100vw; height: 100vh; max-width: none; border-radius: 0; }
        #learn-container:fullscreen { padding: 20px; }
        
        #flow-container .slide-wrapper { width: 100%; height: auto; aspect-ratio: 16/9; max-height: 75vh; border-radius: 12px; overflow: hidden; }
        #flow-container img { object-fit: contain; width: 100%; height: 100%; }

        @media screen and (max-height: 500px) and (orientation: landscape) {
            #flow-container:fullscreen .flow-controls {
                position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: auto; max-width: 95%;
                background: rgba(0, 0, 0, 0.65); border-radius: 50px; padding: 8px 15px !important;
                backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
                display: flex !important; flex-direction: row !important; align-items: center !important; justify-content: center !important; gap: 12px !important; margin-top: 0 !important; z-index: 200;
            }
            #flow-container .mode-toggle { height: 35px; min-width: 120px; }
            #flow-container .flow-controls > div { flex-shrink: 0; }
            
            .tracker-section { display: none !important; }
            .gita-verse-container { display: none !important; }
        }
        
        #learn-container:fullscreen .tracker-section { display: none !important; }
        #flow-container:fullscreen .gita-verse-container { display: none !important; }

        .mode-toggle { display: flex; background: var(--glass); border-radius: 12px; padding: 2px; border: 1px solid var(--border); height: 40px; min-width: 140px; }
        .mode-btn { flex: 1; border: none; background: transparent; color: white; border-radius: 8px; cursor: pointer; font-size: 10px; transition: 0.3s; padding: 0 4px; line-height: 1.2; font-family: 'Inter', sans-serif;}
        .mode-btn.active { background: var(--gold); color: var(--bg); font-weight: bold; }

        /* Learn VSS Desktop/Mobile Layout */
        .learn-layout { display: flex; flex-direction: column; gap: 20px; }
        .learn-layout .video-section { flex: 1; min-width: 0; }
        .learn-layout .video-section .slide-wrapper { width: 100%; aspect-ratio: 16/9; max-height: 75vh; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #000; position: relative;}
        .learn-layout .tracker-section { display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--glass); border: 1px solid var(--border); border-radius: 15px; padding: 20px; }

        .gita-verse-container { margin-top: 25px; padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; transition: all 0.3s ease; }
        .gita-verse-text { color: var(--gold); font-weight: bold; font-size: 14px; line-height: 1.6; text-align: center; font-family: 'Inter', sans-serif; }
        .gita-verse-img { width: 100%; max-width: 320px; border-radius: 12px; display: block; border: 1px solid var(--border); }

        /* Yajna Fullscreen Overlay */
        .yajna-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 2000; display: none; flex-direction: column; opacity: 0; transition: opacity 0.3s ease; overflow: hidden;}
        .yajna-overlay.active { display: flex; opacity: 1; }
        .yajna-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); padding-top: max(20px, env(safe-area-inset-top)); }
        .yajna-content-area { flex: 1; overflow-y: auto; padding: 25px 20px; font-size: 16px; line-height: 1.8; color: white; text-align: left; padding-bottom: 120px; font-family: 'Inter', sans-serif; }

        @media (min-width: 768px) {
            .mobile-nav-wrapper { display: none !important; }
            .nav-links { display: flex !important; }
            body { padding-bottom: 20px; }
            
            .learn-layout { flex-direction: row; align-items: stretch; }
            .learn-layout .tracker-section { width: 250px; flex-shrink: 0; margin-bottom: 0; }

            .gita-verse-img { display: none; }
            .gita-verse-text { font-size: 17px; }
            
            .yajna-content-area { padding: 40px 10%; font-size: 18px; }
        }

        /* Sleek Scrollable Bottom Navigation exactly matched to reference */
        .mobile-nav-wrapper {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #1e3a8a; border-top: 1px solid var(--border);
            z-index: 1000; overflow: hidden; padding-bottom: env(safe-area-inset-bottom, 0);
        }
        .mobile-nav {
            display: flex; align-items: center; width: 100%;
            overflow-x: auto; scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
            scrollbar-width: none; 
        }
        .mobile-nav::-webkit-scrollbar { display: none; } 
        
        .nav-item {
            flex: 0 0 20%; 
            scroll-snap-align: start;
            color: white; opacity: 0.5; display: flex; flex-direction: column; align-items: center;
            font-size: 10px; cursor: pointer; padding: 12px 0; transition: 0.3s ease; font-family: 'Inter', sans-serif;
        }
        .nav-item.active { opacity: 1; color: var(--gold); transform: scale(1.05); }
        .nav-item i { width: 24px; height: 24px; } /* Enforce strict size from reference */

        .nav-arrow {
            position: absolute; top: 0; height: 100%; width: 45px;
            background: transparent; border: none; color: var(--gold);
            cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
        }
        .mobile-nav-wrapper:hover .nav-arrow { opacity: 1; pointer-events: auto; }
        .left-arrow { left: 0; background: linear-gradient(to right, rgba(30,58,138,1) 40%, rgba(30,58,138,0)); }
        .right-arrow { right: 0; background: linear-gradient(to left, rgba(30,58,138,1) 40%, rgba(30,58,138,0)); }
        @media (hover: none) { .nav-arrow { opacity: 0.8; width: 35px; pointer-events: auto; } }

        /* Shruti Chat Companion */
        #shruti-fab {
            position: fixed; bottom: 80px; right: 20px; width: 55px; height: 55px; background: linear-gradient(135deg, var(--gold), #d97706); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4); cursor: pointer; z-index: 1001; transition: transform 0.3s;
        }
        #shruti-fab:hover { transform: scale(1.1); }
        #shruti-fab i { color: var(--bg); }

        #shruti-window {
            position: fixed; bottom: 145px; right: 20px; width: 350px; max-width: calc(100vw - 40px);
            height: 500px; max-height: calc(100vh - 200px); background: rgba(30, 58, 138, 0.95);
            backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px;
            display: none; flex-direction: column; z-index: 1001; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden; transform-origin: bottom right; animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUpMobile { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }

        .shruti-header { padding: 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .shruti-title { font-weight: bold; color: var(--gold); display: flex; align-items: center; }
        .shruti-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .shruti-messages::-webkit-scrollbar { width: 4px; }
        .shruti-messages::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 13px; line-height: 1.5; font-family: 'Inter', sans-serif; }
        .msg-user { align-self: flex-end; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-bottom-right-radius: 4px; }
        .msg-shruti { align-self: flex-start; background: rgba(251, 191, 36, 0.1); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

        .shruti-input-area { padding: 10px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        .shruti-input { flex-grow: 1; background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 13px; min-width: 0; font-family: 'Inter', sans-serif;}
        .shruti-mic { background: var(--glass); border: 1px solid var(--border); width: 38px; height: 38px; border-radius: 50%; color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .shruti-mic.listening { background: #ff4757 !important; border-color: #ff4757 !important; color: white !important; animation: pulseMic 1.5s infinite; }
        @keyframes pulseMic { 0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } }
        .shruti-send { background: var(--gold); border: none; width: 38px; height: 38px; border-radius: 50%; color: var(--bg); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            #shruti-window { 
                top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100vh; height: 100dvh; max-width: 100vw; max-height: none; border-radius: 0; z-index: 9999; animation: slideUpMobile 0.3s ease;
            }
            #shruti-fab { bottom: calc(90px + env(safe-area-inset-bottom, 0px)); right: 15px; }
        }
    </style>
</head>

<script>

let APP_CONFIG = null;

const FALLBACK_CONFIG = {
    settings: {
        enableShruti: true,
        googleSheetUrl: 'https://script.google.com/macros/s/AKfycbxS3fA7rBNW1191FZyGWhIbFAuNh-36uFyEyAaVdDsfZotELuHVn39wGcmZlUhJekLL/exec',

        {id:'drop', title:'Drop', icon:'wind'}, {id:'learn', title:'Learn', icon:'book-open'},
        {id:'mandala', title:'Mandala', icon:'zap'}, {id:'pran', title:'Prāṇa', icon:'loader'},
        {id:'med', title:'Dhyāna', icon:'moon'}, {id:'yajna', title:'Yajna', icon:'video'},
        {id:'sangha', title:'Sangha', icon:'users'}
    ],
    sadhanaMetrics: [

async function loadConfig() {
    try {
        const response = await fetch('./app_config/app_config.json');
        if (response.ok) APP_CONFIG = await response.json();
        else throw new Error("Config not found");
    } catch (e) {
        console.log("Using built-in fallback config.");
        APP_CONFIG = FALLBACK_CONFIG;
    }
    initDynamicUI();
}

function initDynamicUI() {
    const dNav = document.getElementById('desktop-nav-container');
    const mNav = document.getElementById('main-nav');
    const contentContainer = document.getElementById('app-content-container');
    
    dNav.innerHTML = ''; mNav.innerHTML = ''; contentContainer.innerHTML = '';
    
    // Dynamically render DOM blocks in order specified by config
    APP_CONFIG.navigation.forEach(item => {
        dNav.innerHTML += `<li><a onclick="showTab('${item.id}')" id="t-${item.id}">${item.title}</a></li>`;
        mNav.innerHTML += `<div class="nav-item" onclick="showTab('${item.id}')" id="n-${item.id}"><i data-feather="${item.icon}"></i><span style="margin-top: 4px;">${item.title}</span></div>`;
        contentContainer.innerHTML += getPaneHTML(item.id);
    });

    // Hydrate Sādhanā Sliders
    const sliderContainer = document.getElementById('sadhana-sliders-container');
    if(sliderContainer) {
        sliderContainer.innerHTML = APP_CONFIG.sadhanaMetrics.map(m => `
            <div class="metric-card">
                <div class="metric-label-row"><span style="font-family:'Inter', sans-serif;">${m.label}</span><span id="label-${m.id}" class="active-state-text" style="font-family:'Inter', sans-serif;">${m.options[m.default].replace(/<br>/g, ' ')}</span></div>
                <div class="slider-container">
                    <input type="range" class="metric-slider" id="s-${m.id}" min="0" max="${m.max}" value="${m.default}" oninput="updateLabel('${m.id}', this.value)">
                    <div class="slider-labels" id="labels-${m.id}">
                        ${m.options.map((opt, i) => `<span class="${i === m.default ? 'active-label' : ''}" style="font-family:'Inter', sans-serif;">${opt}</span>`).join('')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    if (!APP_CONFIG.settings.enableShruti) {
        document.getElementById('shruti-fab').style.display = 'none';
        document.getElementById('shruti-window').style.display = 'none';
    }

    const bell = document.getElementById('med-bell');
    if(bell) bell.src = APP_CONFIG.settings.meditationBellUrl;

    feather.replace();
    showTab(APP_CONFIG.navigation[0].id); 
    bindTouchEvents();
}

function logSadhanaSnapshot() {
    const today = new Date().toISOString().split('T')[0];
    const obsText = document.getElementById('sadhana-observations').value || "";
    
    let dynamicData = {};
    APP_CONFIG.sadhanaMetrics.forEach(m => {
        dynamicData[m.id] = parseInt(document.getElementById(`s-${m.id}`).value);
    });

    const snapshot = {
        userId: localStorage.getItem('vss_user_id') || 'guest_user',
        date: today,
        time: new Date().toLocaleTimeString(),
        timestamp: new Date().getTime(),
        timing: currentSadhanaTiming,
        ...dynamicData,
        obs: obsText
    };

    if (!sadhanaStore[today]) sadhanaStore[today] = [];
    sadhanaStore[today].push(snapshot);
    localStorage.setItem('vss_sadhana_logs', JSON.stringify(sadhanaStore));
    
    if (!mandalaData.completed.includes(today)) {
        mandalaData.completed.push(today);
        localStorage.setItem('vss_mandala_tracker', JSON.stringify(mandalaData));
    }
    
    // Fix: Send Observation string directly in URL as a fallback if Google overrides JSON body
    let fetchUrl = APP_CONFIG.settings.googleSheetUrl;
    if(obsText) fetchUrl += `?obs=${encodeURIComponent(obsText)}`;

    fetch(fetchUrl, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(snapshot)
    }).catch(error => console.error("Cloud sync failed:", error));

    calculateSadhanaSara();
    renderSadhanaChart();
    alert("Sādhana Snapshot successfully recorded!");
    document.getElementById('sadhana-observations').value = "";
}

function calculateSadhanaSara() {
    const today = new Date().toISOString().split('T')[0];
    const logs = sadhanaStore[today] || [];
    if (logs.length === 0) {
        document.getElementById('dailyScoreBadge').innerText = "--";
        return;
    }

    let totalScore = 0;
    let totalWeight = 0;

    logs.forEach((log, index) => {
        let metricSum = 0;
        APP_CONFIG.sadhanaMetrics.forEach(m => {
            metricSum += (log[m.id] / m.max) * 100;
        });
        let avg = metricSum / APP_CONFIG.sadhanaMetrics.length;
        
        let weight = 1 + (index * 0.1);
        if (avg < 50) weight = 1; 

        totalScore += (avg * weight);
        totalWeight += weight;
    });

    currentDailyScore = Math.round(totalScore / totalWeight);
    if (currentDailyScore > 100) currentDailyScore = 100; 
    document.getElementById('dailyScoreBadge').innerText = currentDailyScore;
}

let medTotalSecs = 20 * 60;
let medSecsLeft = 20 * 60;
let medTimerRunning = false;
let medTimerInterval;

function updateMedTimerDisplay() {
    let m = Math.floor(medSecsLeft / 60);
    let s = medSecsLeft % 60;
    const display = document.getElementById('med-timer-display');
    if (display) display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    
    let ring = document.getElementById('med-timer-ring');
    if (ring) {
        let progress = medSecsLeft / medTotalSecs;
        ring.style.strokeDashoffset = 282.7 * (1 - progress);
    }
}

function adjMedTimer(mins) {
    if (medTimerRunning) return;
    let newMins = Math.floor(medTotalSecs / 60) + mins;
    if (newMins < 1) newMins = 1;
    if (newMins > 120) newMins = 120;
    medTotalSecs = newMins * 60;
    medSecsLeft = medTotalSecs;
    updateMedTimerDisplay();
}

function toggleMedTimer() {
    medTimerRunning = !medTimerRunning;
    let btn = document.getElementById('med-timer-btn');
    let bell = document.getElementById('med-bell');
    
    if (medTimerRunning) {
        bell.load(); 
        btn.innerHTML = '<i data-feather="square" style="width: 20px; height: 20px; fill: white;"></i>'; 
        feather.replace();
        medTimerInterval = setInterval(() => {
            medSecsLeft--;
            if (medSecsLeft <= 0) {
                clearInterval(medTimerInterval);
                medTimerRunning = false;
                medSecsLeft = medTotalSecs; 
                updateMedTimerDisplay();
                bell.play().catch(e => console.log("Audio block", e));
                btn.innerHTML = '<i data-feather="play" style="width: 26px; height: 26px; margin-left: 3px;"></i>';
                feather.replace();
            } else {
                updateMedTimerDisplay();
            }
        }, 1000);
    } else {
        clearInterval(medTimerInterval);
        bell.pause();
        bell.currentTime = 0;
        medSecsLeft = medTotalSecs; 
        updateMedTimerDisplay();
        btn.innerHTML = '<i data-feather="play" style="width: 26px; height: 26px; margin-left: 3px;"></i>';
        feather.replace();
    }
}

function resetMedTimer() {
    clearInterval(medTimerInterval);
    medTimerRunning = false;
    let bell = document.getElementById('med-bell');
    if(bell) { bell.pause(); bell.currentTime = 0; }
    medSecsLeft = medTotalSecs;
    updateMedTimerDisplay();
    let btn = document.getElementById('med-timer-btn');
    if (btn) {
        btn.innerHTML = '<i data-feather="play" style="width: 26px; height: 26px; margin-left: 3px;"></i>';
        feather.replace();
    }
}

function renderWheelItems(type, items) {
    const sourceData = type === 'pran' ? APP_CONFIG.pranayamas : APP_CONFIG.meditations;
    const wheel = document.getElementById(`wheel-${type}`);
    const innerHTML = items.map(item => {
        const origIdx = sourceData.indexOf(item);
        return `<div class="wheel-item" data-orig-idx="${origIdx}" onclick="selectFromWheel('${type}', ${origIdx})">${item.title}</div>`;
    }).join('');
    
    wheel.innerHTML = `<div class="wheel-pad"></div>${innerHTML}<div class="wheel-pad"></div>`;
    wheel.scrollTop = 0;
    handleWheelScroll(type, true);
}

function handleWheelScroll(type, preventRender = false) {
    const sourceData = type === 'pran' ? APP_CONFIG.pranayamas : APP_CONFIG.meditations;
    const wheel = document.getElementById(`wheel-${type}`);
    const items = wheel.querySelectorAll('.wheel-item');
    const wheelCenter = wheel.getBoundingClientRect().top + (wheel.clientHeight / 2);
    
    let closestItem = null;
    let closestDist = Infinity;
    
    items.forEach(item => {
        const rect = item.getBoundingClientRect();
        if(rect.height === 0) return; 
        const itemCenter = rect.top + (rect.height / 2);
        const dist = Math.abs(wheelCenter - itemCenter);
        
        if (dist < closestDist) {
            closestDist = dist;
            closestItem = item;
        }
        item.classList.remove('active');
    });
    
    if (closestItem) {
        closestItem.classList.add('active');
        
        if (!preventRender) {
            clearTimeout(scrollTimeouts[type]);
            scrollTimeouts[type] = setTimeout(() => {
                const origIdx = closestItem.getAttribute('data-orig-idx');
                renderMediaHTML(type, sourceData[origIdx]);
                
                const input = document.getElementById(`input-${type}`);
                if (document.activeElement !== input) {
                    input.value = sourceData[origIdx].title;
                }
            }, 300);
        }
    }
}

function selectFromWheel(type, origIdx) {
    const sourceData = type === 'pran' ? APP_CONFIG.pranayamas : APP_CONFIG.meditations;
    const title = sourceData[origIdx].title;
    document.getElementById(`input-${type}`).value = title;

}

function updateLearnProgress() {
    const learnLessons = APP_CONFIG.learnLessons;
    let totalMins = 0;
    learnLessons.forEach(l => totalMins += l.duration);
     
    let compMins = 0;
    let segmentsHTML = '';
    
    const C = 2 * Math.PI * 40; 
    let currentOffset = 0;
    
    learnLessons.forEach((lesson, i) => {
        const comp = learnData[i];
        if (comp) compMins += lesson.duration;
        
        const color = comp ? 'var(--gold)' : 'rgba(255,255,255,0.2)';
        const segLength = (lesson.duration / totalMins) * C;
        const drawLength = Math.max(0, segLength - 2); 
        const strokeWidth = i === lIdx ? 12 : 8; 
        
        segmentsHTML += `<circle cx="50" cy="50" r="40" fill="none" stroke="${color}" stroke-width="${strokeWidth}" stroke-dasharray="${drawLength} ${C}" stroke-dashoffset="${-currentOffset}" style="transition: 0.3s; cursor: pointer;" onclick="goToLearn(${i})"><title>${lesson.title}</title></circle>`;
        
        currentOffset += segLength;
    });
    
    let leftMins = totalMins - compMins;
    let hrs = Math.floor(leftMins / 60);
    let mins = leftMins % 60;

            pIdx=(pIdx%109)+1; document.getElementById('flow-slide').src=`./parayana/Slide${pIdx}.webp`;

        if(ring){

let recognition;
let isListening = false;

function initSpeech() {
    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (window.SpeechRecognition) {
        recognition = new window.SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-IN'; 
        
        recognition.onstart = () => {
            isListening = true;
            document.getElementById('shruti-mic').classList.add('listening');
            document.getElementById('shruti-input').placeholder = "Listening...";
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('shruti-input').value = transcript;
            sendToShruti();
        };
        
        recognition.onerror = (event) => {
            resetMicUI();
            if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
                alert("Microphone access denied. Please allow microphone permissions in your browser to speak with Shruti.");
            }
        };
        recognition.onend = () => { resetMicUI(); };
    } else { alert("Voice recognition is not supported in this browser. Please try Chrome or Safari."); }
}

function resetMicUI() {
    isListening = false;
    const micBtn = document.getElementById('shruti-mic');
    if(micBtn) micBtn.classList.remove('listening');
    document.getElementById('shruti-input').placeholder = "Ask about Vishnu Sahasranama...";
}

function toggleSpeech() {
    if (!recognition) initSpeech();
    if (!recognition) return;
    try {
        if (isListening) recognition.stop();
        else recognition.start();
    } catch(e) {}
}

async function sendToShruti() {
    const input = document.getElementById('shruti-input');
    const text = input.value.trim();
    if (!text) return;
    
    if (!GROQ_API_KEY) {
        const userKey = prompt("Please enter your Groq API Key (starts with gsk_) to chat with Shruti:");
        if (userKey) GROQ_API_KEY = userKey.trim();
        else return;
    }
    
    const chat = document.getElementById('shruti-chat');
    const userMsg = document.createElement('div');
    userMsg.className = 'msg msg-user';
    userMsg.innerText = text;
    chat.appendChild(userMsg);
    
    input.value = '';
    chat.scrollTop = chat.scrollHeight;

    const typingMsg = document.createElement('div');
    typingMsg.className = 'msg msg-shruti';
    typingMsg.innerHTML = '<i data-feather="more-horizontal" style="animation: pulse 1s infinite;"></i>';
    chat.appendChild(typingMsg);
    feather.replace();
    chat.scrollTop = chat.scrollHeight;

    const messages = [
        { role: "system", content: SHRUTI_SYSTEM },
        ...chatHistory,
        { role: "user", content: `Context from our sacred texts:\n${vishnuKnowledgeBase}\n\nUser Question: ${text}` }
    ];

    try {
        const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_API_KEY}` },
            body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: messages, temperature: 0.3 })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error?.message || "Unknown API Error");

        chat.removeChild(typingMsg); 

        if (data.choices && data.choices.length > 0) {
            const botReplyText = data.choices[0].message.content;
            chatHistory.push({"role": "user", "content": text}, {"role": "assistant", "content": botReplyText});

            const shrutiMsg = document.createElement('div');
            shrutiMsg.className = 'msg msg-shruti';
            shrutiMsg.innerHTML = botReplyText.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            chat.appendChild(shrutiMsg);
        } else { throw new Error("Empty response from Groq."); }
    } catch (error) {
        if(document.body.contains(typingMsg)) chat.removeChild(typingMsg);
        const errorMsg = document.createElement('div');
        errorMsg.className = 'msg msg-shruti';
        errorMsg.innerHTML = `<span style="color: #ff4757;"><b>System Error:</b> ${error.message}</span>`;
        chat.appendChild(errorMsg);
        if(error.message.toLowerCase().includes("key") || error.message.toLowerCase().includes("auth")) GROQ_API_KEY = '';
    }
    chat.scrollTop = chat.scrollHeight;
}
